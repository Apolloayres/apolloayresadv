<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Controle do Escritório</title>
  <style>
    .topo-logo { background-color: #fff; padding: 15px 20px; display: flex; justify-content: center; align-items: center; }
    .logo-escritorio { height: 70px; width: auto; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; color: #333; }

    .navbar { background-color: #1a3a5c; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .navbar-brand { font-size: 1.3rem; font-weight: bold; }
    .nav-links { display: flex; list-style: none; gap: 20px; }
    .nav-links li a { color: #fff; text-decoration: none; font-size: 0.95rem; transition: opacity 0.2s; }
    .nav-links li a:hover { opacity: 0.8; text-decoration: underline; }

    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
    .header h1 { color: #1a3a5c; }

    .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s, transform 0.1s; text-decoration: none; display: inline-block; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background-color: #1a3a5c; color: #fff; }
    .btn-primary:hover { background-color: #142d49; }
    .btn-success { background-color: #28a745; color: #fff; }
    .btn-success:hover { background-color: #218838; }
    .btn-danger { background-color: #dc3545; color: #fff; }
    .btn-danger:hover { background-color: #c82333; }
    .btn-secondary { background-color: #6c757d; color: #fff; }
    .btn-secondary:hover { background-color: #5a6268; }
    .btn-warning { background-color: #ffc107; color: #212529; }
    .btn-warning:hover { background-color: #e0a800; }

    .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e0e0e0; }
    th { background-color: #1a3a5c; color: #fff; font-weight: 500; }
    tr:hover { background-color: #f8f9fa; }
    .acoes { display: flex; gap: 8px; flex-wrap: wrap; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 8px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .modal-header { background-color: #1a3a5c; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 1.2rem; }
    .modal-close { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 15px 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: flex-end; gap: 10px; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .nav-links { display: none; } }

    .autocomplete-list { position: absolute; background: #fff; border: 1px solid #ccc; border-radius: 0 0 5px 5px; max-height: 150px; overflow-y: auto; z-index: 100; width: 100%; display: none; }
    .autocomplete-list div { padding: 8px 12px; cursor: pointer; }
    .autocomplete-list div:hover { background-color: #f0f0f0; }
    .relative { position: relative; }

    .empty { text-align: center; padding: 40px; color: #777; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 500; }
    .badge-fisica { background-color: #e3f2fd; color: #1565c0; }
    .badge-juridica { background-color: #f3e5f5; color: #7b1fa2; }
  </style>
</head>
<body>

<div class="topo-logo">
    <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/apolloayres%40yahoo.com.br/png/image-019eea86-df20-753e-b049-a7c4515d7a68.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260621%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260621T160143Z&X-Amz-Expires=3600&X-Amz-Signature=d86ac73935a9237a01f8898aab4f62b0c323de884239f0049abf5a99c09677ae&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Apollo Ayres" class="logo-escritorio">
</div>

<nav class="navbar">
  <div class="navbar-brand">🏢 Controle do Escritório</div>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="clientes.html">Clientes</a></li>
    <li><a href="processos.html">Processos</a></li>
    <li><a href="relatorios.html">Relatórios</a></li>
  </ul>
</nav>

<div class="container">
  <div class="header">
    <h1>👥 Clientes</h1>
    <div>
      <a href="home.html" class="btn btn-secondary">↩ Voltar</a>
      <button class="btn btn-success" onclick="abrirModal()">+ Novo Cliente</button>
    </div>
  </div>

  <div class="card">
    <table id="tabelaClientes">
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Nome / Razão Social</th>
          <th>CPF / CNPJ</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Localidade</th>
          <th>Tipo Processo</th>
          <th>Empresa</th>
          <th>Tribunal</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="corpoTabela">
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalCliente">
  <div class="modal">
    <div class="modal-header">
      <h2 id="tituloModal">Novo Cliente</h2>
      <button class="modal-close" onclick="fecharModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="formCliente">
        <input type="hidden" id="clienteId">

        <div class="form-group">
          <label for="tipoPessoa">Tipo de Pessoa</label>
          <select id="tipoPessoa" onchange="ajustarMascaraDocumento()">
            <option value="fisica">Pessoa Física</option>
            <option value="juridica">Pessoa Jurídica</option>
          </select>
        </div>

        <div class="form-group">
          <label for="nome">Nome / Razão Social</label>
          <input type="text" id="nome" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="documento">CPF / CNPJ</label>
            <input type="text" id="documento" required maxlength="18">
          </div>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone">
          </div>
          <div class="form-group relative">
            <label for="localidade">Localidade</label>
            <input type="text" id="localidade" autocomplete="off" oninput="buscarLocalidade(this.value)">
            <div class="autocomplete-list" id="listaLocalidade"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="endereco">Endereço</label>
          <input type="text" id="endereco">
        </div>

        <div class="form-row">
          <div class="form-group relative">
            <label for="tipoProcesso">Tipo de Processo</label>
            <input type="text" id="tipoProcesso" autocomplete="off" oninput="buscarTipoProcesso(this.value)">
            <div class="autocomplete-list" id="listaTipoProcesso"></div>
          </div>
          <div class="form-group relative">
            <label for="empresa">Empresa</label>
            <input type="text" id="empresa" autocomplete="off" oninput="buscarEmpresa(this.value)">
            <div class="autocomplete-list" id="listaEmpresa"></div>
          </div>
        </div>

        <div class="form-group relative">
          <label for="tribunal">Tribunal</label>
          <input type="text" id="tribunal" autocomplete="off" oninput="buscarTribunal(this.value)">
          <div class="autocomplete-list" id="listaTribunal"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarCliente()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalTribunal">
  <div class="modal">
    <div class="modal-header">
      <h2>Detalhes do Tribunal</h2>
      <button class="modal-close" onclick="fecharModalTribunal()">&times;</button>
    </div>
    <div class="modal-body" id="conteudoTribunal">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="fecharModalTribunal()">Fechar</button>
    </div>
  </div>
</div>

<script>
  const db = {
    clientes: JSON.parse(localStorage.getItem('clientes') || '[]'),
    localidades: ['São Paulo - SP', 'Rio de Janeiro - RJ', 'Belo Horizonte - MG', 'Curitiba - PR', 'Brasília - DF', 'Porto Alegre - RS', 'Salvador - BA', 'Recife - PE', 'Fortaleza - CE', 'Manaus - AM'],
    tiposProcesso: ['Trabalhista', 'Cível', 'Previdenciário', 'Tributário', 'Família', 'Consumidor', 'Penal', 'Administrativo', 'Ambiental', 'Imobiliário'],
    empresas: ['Apollo Ayres Advogados', 'Cliente Empresa Alpha', 'Cliente Empresa Beta', 'Cliente Empresa Gama', 'Indústria Ltda', 'Comércio S.A.'],
    tribunais: ['TRT-2', 'TRT-3', 'TRF-3', 'TJSP', 'TJRS', 'STF', 'STJ', 'TRF-1', 'TRT-1', 'TST']
  };

  function salvarLocal() {
    localStorage.setItem('clientes', JSON.stringify(db.clientes));
  }

  function carregarClientes() {
    renderizarTabela(db.clientes);
  }

  function renderizarTabela(clientes) {
    const tbody = document.getElementById('corpoTabela');
    tbody.innerHTML = '';

    if (clientes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty">Nenhum cliente cadastrado.</td></tr>';
      return;
    }

    clientes.forEach(cliente => {
      const tr = document.createElement('tr');
      const badge = cliente.tipoPessoa === 'juridica' ? 'badge-juridica' : 'badge-fisica';
      const tipoLabel = cliente.tipoPessoa === 'juridica' ? 'Jurídica' : 'Física';
      tr.innerHTML = `
        <td><span class="badge ${badge}">${tipoLabel}</span></td>
        <td>${cliente.nome}</td>
        <td>${cliente.documento}</td>
        <td>${cliente.email || '-'}</td>
        <td>${cliente.telefone || '-'}</td>
        <td>${cliente.localidade || '-'}</td>
        <td>${cliente.tipoProcesso || '-'}</td>
        <td>${cliente.empresa || '-'}</td>
        <td>${cliente.tribunal ? `<a href="#" onclick="abrirModalTribunal('${cliente.tribunal}'); return false;">${cliente.tribunal}</a>` : '-'}</td>
        <td class="acoes">
          <button class="btn btn-warning" onclick="editarCliente(${cliente.id})">Editar</button>
          <button class="btn btn-danger" onclick="excluirCliente(${cliente.id})">Excluir</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function abrirModal(id = null) {
    document.getElementById('formCliente').reset();
    document.getElementById('clienteId').value = '';
    document.getElementById('tituloModal').textContent = 'Novo Cliente';
    ajustarMascaraDocumento();
    document.getElementById('modalCliente').classList.add('active');

    if (id) {
      const cliente = db.clientes.find(c => c.id === id);
      if (cliente) {
        document.getElementById('clienteId').value = cliente.id;
        document.getElementById('tipoPessoa').value = cliente.tipoPessoa;
        document.getElementById('nome').value = cliente.nome;
        document.getElementById('documento').value = cliente.documento;
        document.getElementById('email').value = cliente.email || '';
        document.getElementById('telefone').value = cliente.telefone || '';
        document.getElementById('endereco').value = cliente.endereco || '';
        document.getElementById('localidade').value = cliente.localidade || '';
        document.getElementById('tipoProcesso').value = cliente.tipoProcesso || '';
        document.getElementById('empresa').value = cliente.empresa || '';
        document.getElementById('tribunal').value = cliente.tribunal || '';
        document.getElementById('tituloModal').textContent = 'Editar Cliente';
        ajustarMascaraDocumento();
      }
    }
  }

  function fecharModal() {
    document.getElementById('modalCliente').classList.remove('active');
    esconderAutocomplete('listaLocalidade');
    esconderAutocomplete('listaTipoProcesso');
    esconderAutocomplete('listaEmpresa');
    esconderAutocomplete('listaTribunal');
  }

  function ajustarMascaraDocumento() {
    const tipo = document.getElementById('tipoPessoa').value;
    const campo = document.getElementById('documento');
    campo.value = '';
    campo.maxLength = tipo === 'juridica' ? 18 : 14;
    campo.placeholder = tipo === 'juridica' ? '00.000.000/0000-00' : '000.000.000-00';
  }

  function salvarCliente() {
    const id = document.getElementById('clienteId').value;
    const tipoPessoa = document.getElementById('tipoPessoa').value;
    const nome = document.getElementById('nome').value.trim();
    const documento = document.getElementById('documento').value.trim();
    const email = document.getElementById('email').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const endereco = document.getElementById('endereco').value.trim();
    const localidade = document.getElementById('localidade').value.trim();
    const tipoProcesso = document.getElementById('tipoProcesso').value.trim();
    const empresa = document.getElementById('empresa').value.trim();
    const tribunal = document.getElementById('tribunal').value.trim();

    if (!nome || !documento) {
      alert('Nome e CPF/CNPJ são obrigatórios.');
      return;
    }

    if (id) {
      const idx = db.clientes.findIndex(c => c.id == id);
      if (idx >= 0) {
        db.clientes[idx] = { id: Number(id), tipoPessoa, nome, documento, email, telefone, endereco, localidade, tipoProcesso, empresa, tribunal };
      }
    } else {
      const novoId = db.clientes.length ? Math.max(...db.clientes.map(c => c.id)) + 1 : 1;
      db.clientes.push({ id: novoId, tipoPessoa, nome, documento, email, telefone, endereco, localidade, tipoProcesso, empresa, tribunal });
    }

    salvarLocal();
    renderizarTabela(db.clientes);
    fecharModal();
  }

  function editarCliente(id) {
    abrirModal(id);
  }

  function excluirCliente(id) {
    if (!confirm('Tem certeza que deseja excluir este cliente?')) return;
    db.clientes = db.clientes.filter(c => c.id !== id);
    salvarLocal();
    renderizarTabela(db.clientes);
  }

  function buscarLocalidade(termo) {
    mostrarAutocomplete('listaLocalidade', termo, db.localidades, 'localidade');
  }

  function buscarTipoProcesso(termo) {
    mostrarAutocomplete('listaTipoProcesso', termo, db.tiposProcesso, 'tipoProcesso');
  }

  function buscarEmpresa(termo) {
    mostrarAutocomplete('listaEmpresa', termo, db.empresas, 'empresa');
  }

  function buscarTribunal(termo) {
    mostrarAutocomplete('listaTribunal', termo, db.tribunais, 'tribunal');
  }

  function mostrarAutocomplete(listaId, termo, opcoes, campoId) {
    const lista = document.getElementById(listaId);
    if (!termo) { lista.style.display = 'none'; return; }
    const filtrados = opcoes.filter(o => o.toLowerCase().includes(termo.toLowerCase()));
    if (filtrados.length === 0) { lista.style.display = 'none'; return; }
    lista.innerHTML = filtrados.map(o => `<div onclick="selecionarAutocomplete('${campoId}', '${listaId}', '${o.replace(/'/g, "\\'")}')">${o}</div>`).join('');
    lista.style.display = 'block';
  }

  function selecionarAutocomplete(campoId, listaId, valor) {
    document.getElementById(campoId).value = valor;
    document.getElementById(listaId).style.display = 'none';
  }

  function esconderAutocomplete(listaId) {
    document.getElementById(listaId).style.display = 'none';
  }

  function abrirModalTribunal(tribunal) {
    const conteudo = document.getElementById('conteudoTribunal');
    conteudo.innerHTML = `<p><strong>Tribunal:</strong> ${tribunal}</p><p>Informações e status do tribunal podem ser consultados aqui.</p>`;
    document.getElementById('modalTribunal').classList.add('active');
  }

  function fecharModalTribunal() {
    document.getElementById('modalTribunal').classList.remove('active');
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.relative')) {
      esconderAutocomplete('listaLocalidade');
      esconderAutocomplete('listaTipoProcesso');
      esconderAutocomplete('listaEmpresa');
      esconderAutocomplete('listaTribunal');
    }
  });

  window.onload = carregarClientes;
</script>

</body>
</html>
