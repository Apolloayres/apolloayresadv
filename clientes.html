<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Controle do Escritório</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #f4f4f4; color: #333; }
    .topo-logo { background-color: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #ddd; }
    .logo-escritorio { height: 70px; }
    .btn-voltar { position: absolute; top: 100px; right: 20px; background-color: #fff; border: 1px solid #003366; padding: 8px 16px; border-radius: 6px; color: #003366; cursor: pointer; text-decoration: none; font-weight: bold; }
    .btn-voltar:hover { background-color: #e6f0ff; }
    .navbar { background-color: #003366; display: flex; justify-content: center; gap: 30px; padding: 12px; }
    .navbar a { color: #fff; text-decoration: none; font-weight: bold; }
    .navbar a:hover { text-decoration: underline; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .resumo { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
    .card-resumo { background: #fff; padding: 20px; border-radius: 8px; flex: 1; min-width: 180px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card-resumo h3 { font-size: 14px; color: #777; margin-bottom: 8px; }
    .card-resumo p { font-size: 24px; font-weight: bold; color: #003366; }
    .barra-busca { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .barra-busca input { padding: 10px; flex: 1; min-width: 200px; border: 1px solid #ccc; border-radius: 6px; }
    .barra-busca button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-buscar { background-color: #003366; color: #fff; }
    .btn-novo { background-color: #28a745; color: #fff; }
    .formulario { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 25px; display: none; }
    .formulario h2 { margin-bottom: 20px; color: #003366; }
    .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
    .form-group { flex: 1; min-width: 200px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    .form-group textarea { resize: vertical; }
    .form-botoes { display: flex; gap: 10px; margin-top: 20px; }
    .btn-salvar { background-color: #003366; color: #fff; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-cancelar { background-color: #aaa; color: #fff; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid #eee; }
    th { background-color: #003366; color: #fff; }
    td a { color: #003366; text-decoration: none; margin-right: 10px; cursor: pointer; }
    td a:hover { text-decoration: underline; }
    .excluir { color: #dc3545; }
  </style>
</head>
<body>

  <div class="topo-logo">
    <img class="logo-escritorio" src="https://raw.githubusercontent.com/apolloayres/apolloayresadv/main/logo.png" alt="Logo Escritório">
  </div>

  <a href="home.html" class="btn-voltar">← Voltar</a>

  <nav class="navbar">
    <a href="home.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="processos.html">Processos</a>
    <a href="tarefas.html">Tarefas</a>
    <a href="configuracoes.html">Configurações</a>
  </nav>

  <div class="container">
    <div class="resumo">
      <div class="card-resumo">
        <h3>Total Clientes</h3>
        <p id="totalClientes">0</p>
      </div>
      <div class="card-resumo">
        <h3>Ativos</h3>
        <p id="clientesAtivos">0</p>
      </div>
      <div class="card-resumo">
        <h3>Pendentes</h3>
        <p id="clientesPendentes">0</p>
      </div>
    </div>

    <div class="barra-busca">
      <input type="text" id="campoBusca" placeholder="Buscar por nome, CPF/CNPJ ou cidade...">
      <button class="btn-buscar" onclick="listarClientes()">Buscar</button>
      <button class="btn-novo" onclick="abrirFormulario()">Novo Cliente</button>
    </div>

    <div class="formulario" id="formularioCliente">
      <h2 id="tituloFormulario">Novo Cliente</h2>
      <input type="hidden" id="clienteId">
      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="nome">
        </div>
        <div class="form-group">
          <label>CPF/CNPJ</label>
          <input type="text" id="cpfCnpj">
        </div>
        <div class="form-group">
          <label>RG</label>
          <input type="text" id="rg">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Telefone</label>
          <input type="text" id="telefone">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>
        <div class="form-group">
          <label>CEP</label>
          <input type="text" id="cep" onblur="buscarCEP()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex: 2;">
          <label>Endereço</label>
          <input type="text" id="endereco">
        </div>
        <div class="form-group">
          <label>Número</label>
          <input type="text" id="numero">
        </div>
        <div class="form-group">
          <label>Complemento</label>
          <input type="text" id="complemento">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Bairro</label>
          <input type="text" id="bairro">
        </div>
        <div class="form-group">
          <label>Cidade</label>
          <input type="text" id="cidade">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <input type="text" id="estado">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex: 2;">
          <label>Observações</label>
          <textarea id="observacoes" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Data de Cadastro</label>
          <input type="date" id="dataCadastro">
        </div>
      </div>
      <div class="form-botoes">
        <button class="btn-salvar" onclick="salvarCliente()">Salvar</button>
        <button class="btn-cancelar" onclick="fecharFormulario()">Cancelar</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>CPF/CNPJ</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Cidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaClientes">
      </tbody>
    </table>
  </div>

  <script>
    let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

    function abrirFormulario() {
      document.getElementById('formularioCliente').style.display = 'block';
      document.getElementById('tituloFormulario').innerText = 'Novo Cliente';
      document.getElementById('clienteId').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('cpfCnpj').value = '';
      document.getElementById('rg').value = '';
      document.getElementById('telefone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('cep').value = '';
      document.getElementById('endereco').value = '';
      document.getElementById('numero').value = '';
      document.getElementById('complemento').value = '';
      document.getElementById('bairro').value = '';
      document.getElementById('cidade').value = '';
      document.getElementById('estado').value = '';
      document.getElementById('observacoes').value = '';
      document.getElementById('dataCadastro').value = new Date().toISOString().split('T')[0];
    }

    function fecharFormulario() {
      document.getElementById('formularioCliente').style.display = 'none';
    }

    function salvarCliente() {
      const id = document.getElementById('clienteId').value;
      const cliente = {
        id: id ? parseInt(id) : Date.now(),
        nome: document.getElementById('nome').value,
        cpfCnpj: document.getElementById('cpfCnpj').value,
        rg: document.getElementById('rg').value,
        telefone: document.getElementById('telefone').value,
        email: document.getElementById('email').value,
        cep: document.getElementById('cep').value,
        endereco: document.getElementById('endereco').value,
        numero: document.getElementById('numero').value,
        complemento: document.getElementById('complemento').value,
        bairro: document.getElementById('bairro').value,
        cidade: document.getElementById('cidade').value,
        estado: document.getElementById('estado').value,
        observacoes: document.getElementById('observacoes').value,
        dataCadastro: document.getElementById('dataCadastro').value,
        status: 'Ativo'
      };

      if (id) {
        const index = clientes.findIndex(c => c.id === parseInt(id));
        clientes[index] = cliente;
      } else {
        clientes.push(cliente);
      }

      localStorage.setItem('clientes', JSON.stringify(clientes));
      fecharFormulario();
      listarClientes();
    }

    function editarCliente(id) {
      const cliente = clientes.find(c => c.id === id);
      if (!cliente) return;

      document.getElementById('formularioCliente').style.display = 'block';
      document.getElementById('tituloFormulario').innerText = 'Editar Cliente';
      document.getElementById('clienteId').value = cliente.id;
      document.getElementById('nome').value = cliente.nome;
      document.getElementById('cpfCnpj').value = cliente.cpfCnpj;
      document.getElementById('rg').value = cliente.rg;
      document.getElementById('telefone').value = cliente.telefone;
      document.getElementById('email').value = cliente.email;
      document.getElementById('cep').value = cliente.cep;
      document.getElementById('endereco').value = cliente.endereco;
      document.getElementById('numero').value = cliente.numero;
      document.getElementById('complemento').value = cliente.complemento;
      document.getElementById('bairro').value = cliente.bairro;
      document.getElementById('cidade').value = cliente.cidade;
      document.getElementById('estado').value = cliente.estado;
      document.getElementById('observacoes').value = cliente.observacoes;
      document.getElementById('dataCadastro').value = cliente.dataCadastro;
    }

    function excluirCliente(id) {
      if (confirm('Deseja realmente excluir este cliente?')) {
        clientes = clientes.filter(c => c.id !== id);
        localStorage.setItem('clientes', JSON.stringify(clientes));
        listarClientes();
      }
    }

    function listarClientes() {
      const busca = document.getElementById('campoBusca').value.toLowerCase();
      const filtrados = clientes.filter(c =>
        c.nome.toLowerCase().includes(busca) ||
        c.cpfCnpj.toLowerCase().includes(busca) ||
        c.cidade.toLowerCase().includes(busca)
      );

      const tbody = document.getElementById('tabelaClientes');
      tbody.innerHTML = '';

      filtrados.forEach(c => {
        tbody.innerHTML += `
          <tr>
            <td>${c.nome}</td>
            <td>${c.cpfCnpj}</td>
            <td>${c.telefone}</td>
            <td>${c.email}</td>
            <td>${c.cidade}</td>
            <td>
              <a onclick="editarCliente(${c.id})">Editar</a>
              <a class="excluir" onclick="excluirCliente(${c.id})">Excluir</a>
            </td>
          </tr>
        `;
      });

      atualizarResumo();
    }

    function atualizarResumo() {
      document.getElementById('totalClientes').innerText = clientes.length;
      document.getElementById('clientesAtivos').innerText = clientes.filter(c => c.status === 'Ativo').length;
      document.getElementById('clientesPendentes').innerText = clientes.filter(c => c.status !== 'Ativo').length;
    }

    function buscarCEP() {
      const cep = document.getElementById('cep').value.replace(/\D/g, '');
      if (cep.length !== 8) return;

      fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(res => res.json())
        .then(data => {
          if (!data.erro) {
            document.getElementById('endereco').value = data.logradouro;
            document.getElementById('bairro').value = data.bairro;
            document.getElementById('cidade').value = data.localidade;
            document.getElementById('estado').value = data.uf;
          }
        })
        .catch(err => console.error('Erro ao buscar CEP:', err));
    }

    listarClientes();
  </script>

</body>
</html>
