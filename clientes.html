<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Apollo Ayres</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .topo-logo { background-color: #fff; padding: 15px 20px; display: flex; justify-content: center; align-items: center; }
        .logo-escritorio { height: 70px; width: auto; }
        body { background-color: #f5f6fa; color: #333; }
        .navbar { background-color: #003366; color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar h1 { font-size: 1.4rem; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.95rem; padding: 8px 12px; border-radius: 5px; transition: background 0.3s; }
        .nav-links a:hover { background-color: #0055a5; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .card h3 { font-size: 0.95rem; color: #666; margin-bottom: 10px; }
        .card p { font-size: 1.6rem; font-weight: bold; color: #003366; }
        .toolbusca { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .toolbusca input { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; min-width: 250px; }
        .toolbusca button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: background 0.3s; }
        .btn-azul { background-color: #003366; color: #fff; }
        .btn-azul:hover { background-color: #0055a5; }
        .btn-verde { background-color: #28a745; color: #fff; }
        .btn-verde:hover { background-color: #218838; }
        .btn-cinza { background-color: #6c757d; color: #fff; }
        .btn-cinza:hover { background-color: #5a6268; }
        .btn-vermelho { background-color: #dc3545; color: #fff; }
        .btn-vermelho:hover { background-color: #c82333; }
        .table-section { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 25px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.92rem; }
        th { background-color: #003366; color: #fff; font-weight: 600; }
        tr:hover { background-color: #f1f5f9; }
        .acoes { display: flex; gap: 8px; }
        .acoes button { padding: 6px 10px; border: none; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
        .form-section { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-section h2 { margin-bottom: 20px; color: #003366; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.9rem; color: #555; margin-bottom: 6px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-full { grid-column: 1 / -1; }
        .form-actions { margin-top: 20px; display: flex; gap: 15px; }
        .hidden { display: none; }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 10px; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .toolbusca { flex-direction: column; align-items: stretch; }
            .toolbusca input { min-width: 100%; }
            .form-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="topo-logo">
        <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/apolloayres%40yahoo.com.br/png/image-019eea86-df20-753e-b049-a7c4515d7a68.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260621%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260621T160143Z&X-Amz-Expires=3600&X-Amz-Signature=d86ac73935a9237a01f8898aab4f62b0c323de884239f0049abf5a99c09677ae&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Apollo Ayres" class="logo-escritorio">
    </div>
    <nav class="navbar">
        <h1>Gestão de Clientes</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="processos.html">Processos</a>
            <a href="tarefas.html">Tarefas</a>
            <a href="configuracoes.html">Configurações</a>
        </div>
    </nav>

    <div class="container">
        <div class="cards">
            <div class="card">
                <h3>Total de Clientes</h3>
                <p id="totalClientes">0</p>
            </div>
            <div class="card">
                <h3>Clientes Ativos</h3>
                <p id="clientesAtivos">0</p>
            </div>
            <div class="card">
                <h3>Clientes Inativos</h3>
                <p id="clientesInativos">0</p>
            </div>
            <div class="card">
                <h3>Novos este Mês</h3>
                <p id="novosMes">0</p>
            </div>
        </div>

        <div class="toolbusca">
            <input type="text" id="buscaCliente" placeholder="Buscar por nome, CPF, e-mail ou telefone...">
            <div>
                <button class="btn-azul" onclick="buscarClientes()">Buscar</button>
                <button class="btn-cinza" onclick="limparBusca()">Limpar</button>
            </div>
            <button class="btn-verde" onclick="novoCliente()">+ Novo Cliente</button>
        </div>

        <div class="table-section">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Nascimento</th>
                        <th>Naturalidade</th>
                        <th>Profissão</th>
                        <th>Estado Civil</th>
                        <th>Nacionalidade</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaClientes">
                    <!-- Dados serão preenchidos via JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="form-section" id="formSection">
            <h2 id="formTitulo">Cadastrar Novo Cliente</h2>
            <form id="formCliente">
                <input type="hidden" id="clienteId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome">Nome Completo *</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" name="cpf" required maxlength="14">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" name="telefone" maxlength="15">
                    </div>
                    <div class="form-group">
                        <label for="dataNascimento">Data de Nascimento</label>
                        <input type="date" id="dataNascimento" name="dataNascimento">
                    </div>
                    <div class="form-group">
                        <label for="naturalidade">Naturalidade</label>
                        <input type="text" id="naturalidade" name="naturalidade" placeholder="Cidade/UF">
                    </div>
                    <div class="form-group">
                        <label for="nacionalidade">Nacionalidade</label>
                        <input type="text" id="nacionalidade" name="nacionalidade" value="Brasileira">
                    </div>
                    <div class="form-group">
                        <label for="estadoCivil">Estado Civil</label>
                        <select id="estadoCivil" name="estadoCivil">
                            <option value="">Selecione</option>
                            <option value="Solteiro(a)">Solteiro(a)</option>
                            <option value="Casado(a)">Casado(a)</option>
                            <option value="Divorciado(a)">Divorciado(a)</option>
                            <option value="Viúvo(a)">Viúvo(a)</option>
                            <option value="União Estável">União Estável</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="profissao">Profissão</label>
                        <input type="text" id="profissao" name="profissao">
                    </div>
                    <div class="form-group">
                        <label for="rg">RG</label>
                        <input type="text" id="rg" name="rg">
                    </div>
                    <div class="form-group">
                        <label for="orgaoExpedidor">Órgão Expedidor</label>
                        <input type="text" id="orgaoExpedidor" name="orgaoExpedidor" placeholder="Ex: SSP/SP">
                    </div>
                    <div class="form-group">
                        <label for="ufRg">UF RG</label>
                        <select id="ufRg" name="ufRg">
                            <option value="">Selecione</option>
                            <option value="AC">AC</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="AM">AM</option>
                            <option value="BA">BA</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="ES">ES</option>
                            <option value="GO">GO</option>
                            <option value="MA">MA</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="MG">MG</option>
                            <option value="PA">PA</option>
                            <option value="PB">PB</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="PI">PI</option>
                            <option value="RJ">RJ</option>
                            <option value="RN">RN</option>
                            <option value="RS">RS</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SC">SC</option>
                            <option value="SP">SP</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="nomeMae">Nome da Mãe</label>
                        <input type="text" id="nomeMae" name="nomeMae">
                    </div>
                    <div class="form-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" name="cep" maxlength="9" onblur="buscarCep()">
                    </div>
                    <div class="form-group">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="endereco">
                    </div>
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" name="numero">
                    </div>
                    <div class="form-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" name="complemento">
                    </div>
                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" name="bairro">
                    </div>
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade">
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <select id="uf" name="uf">
                            <option value="">Selecione</option>
                            <option value="AC">AC</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="AM">AM</option>
                            <option value="BA">BA</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="ES">ES</option>
                            <option value="GO">GO</option>
                            <option value="MA">MA</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="MG">MG</option>
                            <option value="PA">PA</option>
                            <option value="PB">PB</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="PI">PI</option>
                            <option value="RJ">RJ</option>
                            <option value="RN">RN</option>
                            <option value="RS">RS</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SC">SC</option>
                            <option value="SP">SP</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>
                    <div class="form-group form-full">
                        <label for="observacoes">Observações</label>
                        <textarea id="observacoes" name="observacoes"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-verde">Salvar Cliente</button>
                    <button type="button" class="btn-cinza" onclick="cancelarEdicao()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        let clienteEditando = null;

        document.getElementById('formCliente').addEventListener('submit', function(e) {
            e.preventDefault();
            salvarCliente();
        });

        document.getElementById('cpf').addEventListener('input', function(e) {
            e.target.value = formatarCPF(e.target.value);
        });

        document.getElementById('telefone').addEventListener('input', function(e) {
            e.target.value = formatarTelefone(e.target.value);
        });

        document.getElementById('cep').addEventListener('input', function(e) {
            e.target.value = formatarCEP(e.target.value);
        });

        document.getElementById('buscaCliente').addEventListener('input', buscarClientes);

        function formatarCPF(valor) {
            return valor.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2').substring(0, 14);
        }

        function formatarTelefone(valor) {
            valor = valor.replace(/\D/g, '');
            if (valor.length > 10) {
                return valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3').substring(0, 15);
            }
            return valor.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3').substring(0, 14);
        }

        function formatarCEP(valor) {
            return valor.replace(/\D/g, '').replace(/(\d{5})(\d)/, '$1-$2').substring(0, 9);
        }

        function formatarData(data) {
            if (!data) return '-';
            const d = new Date(data);
            return d.toLocaleDateString('pt-BR');
        }

        function salvarCliente() {
            const cliente = {
                id: clienteEditando ? clienteEditando.id : Date.now(),
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                dataNascimento: document.getElementById('dataNascimento').value,
                naturalidade: document.getElementById('naturalidade').value,
                nacionalidade: document.getElementById('nacionalidade').value,
                estadoCivil: document.getElementById('estadoCivil').value,
                profissao: document.getElementById('profissao').value,
                rg: document.getElementById('rg').value,
                orgaoExpedidor: document.getElementById('orgaoExpedidor').value,
                ufRg: document.getElementById('ufRg').value,
                nomeMae: document.getElementById('nomeMae').value,
                cep: document.getElementById('cep').value,
                endereco: document.getElementById('endereco').value,
                numero: document.getElementById('numero').value,
                complemento: document.getElementById('complemento').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                uf: document.getElementById('uf').value,
                observacoes: document.getElementById('observacoes').value,
                status: 'Ativo',
                dataCadastro: clienteEditando ? clienteEditando.dataCadastro : new Date().toISOString()
            };

            if (clienteEditando) {
                const index = clientes.findIndex(c => c.id === clienteEditando.id);
                clientes[index] = cliente;
            } else {
                clientes.push(cliente);
            }

            localStorage.setItem('clientes', JSON.stringify(clientes));
            resetarFormulario();
            renderizarTabela();
        }

        function editarCliente(id) {
            const cliente = clientes.find(c => c.id === id);
            if (!cliente) return;

            clienteEditando = cliente;
            document.getElementById('formTitulo').textContent = 'Editar Cliente';
            document.getElementById('clienteId').value = cliente.id;
            document.getElementById('nome').value = cliente.nome || '';
            document.getElementById('cpf').value = cliente.cpf || '';
            document.getElementById('email').value = cliente.email || '';
            document.getElementById('telefone').value = cliente.telefone || '';
            document.getElementById('dataNascimento').value = cliente.dataNascimento || '';
            document.getElementById('naturalidade').value = cliente.naturalidade || '';
            document.getElementById('nacionalidade').value = cliente.nacionalidade || '';
            document.getElementById('estadoCivil').value = cliente.estadoCivil || '';
            document.getElementById('profissao').value = cliente.profissao || '';
            document.getElementById('rg').value = cliente.rg || '';
            document.getElementById('orgaoExpedidor').value = cliente.orgaoExpedidor || '';
            document.getElementById('ufRg').value = cliente.ufRg || '';
            document.getElementById('nomeMae').value = cliente.nomeMae || '';
            document.getElementById('cep').value = cliente.cep || '';
            document.getElementById('endereco').value = cliente.endereco || '';
            document.getElementById('numero').value = cliente.numero || '';
            document.getElementById('complemento').value = cliente.complemento || '';
            document.getElementById('bairro').value = cliente.bairro || '';
            document.getElementById('cidade').value = cliente.cidade || '';
            document.getElementById('uf').value = cliente.uf || '';
            document.getElementById('observacoes').value = cliente.observacoes || '';

            document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
        }

        function excluirCliente(id) {
            if (!confirm('Tem certeza que deseja excluir este cliente?')) return;
            clientes = clientes.filter(c => c.id !== id);
            localStorage.setItem('clientes', JSON.stringify(clientes));
            renderizarTabela();
        }

        function resetarFormulario() {
            clienteEditando = null;
            document.getElementById('formTitulo').textContent = 'Cadastrar Novo Cliente';
            document.getElementById('formCliente').reset();
        }

        function cancelarEdicao() {
            resetarFormulario();
        }

        function novoCliente() {
            resetarFormulario();
            document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
        }

        function buscarClientes() {
            renderizarTabela();
        }

        function limparBusca() {
            document.getElementById('buscaCliente').value = '';
            renderizarTabela();
        }

        function renderizarTabela() {
            const busca = document.getElementById('buscaCliente').value.toLowerCase();
            const tbody = document.getElementById('tabelaClientes');
            tbody.innerHTML = '';

            const filtrados = clientes.filter(c => {
                return !busca ||
                    (c.nome && c.nome.toLowerCase().includes(busca)) ||
                    (c.cpf && c.cpf.toLowerCase().includes(busca)) ||
                    (c.email && c.email.toLowerCase().includes(busca)) ||
                    (c.telefone && c.telefone.toLowerCase().includes(busca));
            });

            filtrados.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${c.id}</td>
                    <td>${c.nome || '-'}</td>
                    <td>${c.cpf || '-'}</td>
                    <td>${c.email || '-'}</td>
                    <td>${c.telefone || '-'}</td>
                    <td>${formatarData(c.dataNascimento)}</td>
                    <td>${c.naturalidade || '-'}</td>
                    <td>${c.profissao || '-'}</td>
                    <td>${c.estadoCivil || '-'}</td>
                    <td>${c.nacionalidade || '-'}</td>
                    <td>${c.status || 'Ativo'}</td>
                    <td class="acoes">
                        <button class="btn-azul" onclick="editarCliente(${c.id})">Editar</button>
                        <button class="btn-vermelho" onclick="excluirCliente(${c.id})">Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            atualizarCards();
        }

        function atualizarCards() {
            document.getElementById('totalClientes').textContent = clientes.length;
            document.getElementById('clientesAtivos').textContent = clientes.filter(c => c.status === 'Ativo').length;
            document.getElementById('clientesInativos').textContent = clientes.filter(c => c.status !== 'Ativo').length;
            const hoje = new Date();
            const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
            document.getElementById('novosMes').textContent = clientes.filter(c => new Date(c.dataCadastro) >= inicioMes).length;
        }

        async function buscarCep() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();

                if (data.erro) {
                    alert('CEP não encontrado.');
                    return;
                }

                document.getElementById('endereco').value = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro || '';
                document.getElementById('cidade').value = data.localidade || '';
                document.getElementById('uf').value = data.uf || '';
                document.getElementById('complemento').value = data.complemento || '';
            } catch (error) {
                console.error('Erro ao buscar CEP:', error);
                alert('Erro ao consultar o ViaCEP.');
            }
        }

        renderizarTabela();
    </script>
</body>
</html>
