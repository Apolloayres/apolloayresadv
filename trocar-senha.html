<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trocar Senha — Controle do Escritório</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .navbar {
      background-color: #0a58ca !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    .card {
      border-radius: 12px;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    label {
      font-weight: 500;
      color: #475569;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="home.html">
        🏛️ Controle do Escritório
      </a>
      <div class="d-flex gap-2">
        <a href="home.html" class="btn btn-outline-light btn-sm">Voltar</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-1">🔒 Trocar Senha</h2>
    <p class="text-muted mb-4">Altere sua senha de acesso</p>

    <div class="card mx-auto p-4" style="max-width: 500px;">
      <form onsubmit="alterarSenha(event)">
        <div class="form-group mb-3">
          <label for="emailTroca">Email</label>
          <input type="text" id="emailTroca" class="form-control" disabled>
        </div>
        <div class="form-group mb-3">
          <label for="senhaAtual">Senha Atual</label>
          <input type="password" id="senhaAtual" class="form-control" required placeholder="Digite sua senha atual">
        </div>
        <div class="form-group mb-3">
          <label for="novaSenha">Nova Senha</label>
          <input type="password" id="novaSenha" class="form-control" required placeholder="Digite a nova senha" minlength="4">
        </div>
        <div class="form-group mb-3">
          <label for="confirmarSenha">Confirmar Nova Senha</label>
          <input type="password" id="confirmarSenha" class="form-control" required placeholder="Confirme a nova senha">
        </div>
        <div id="mensagemResultado" class="alert" role="alert" style="display: none;"></div>
        <button type="submit" class="btn btn-primary w-100">🔄 Alterar Senha</button>
      </form>
    </div>

    <p class="mt-4 text-center text-muted">
      O administrador principal (admin@escritorio.com) não pode alterar a senha pelo sistema.
    </p>
  </div>

  <footer class="text-center py-4 text-muted">
    © 2025 Controle do Escritório - Todos os direitos reservados
  </footer>

  <script src="auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      verificarAutenticacao();
      document.getElementById('emailTroca').value = localStorage.getItem('usuarioEmail') || '';
    });

    async function alterarSenha(event) {
      event.preventDefault();

      const email = document.getElementById('emailTroca').value;
      const senhaAtual = document.getElementById('senhaAtual').value;
      const novaSenha = document.getElementById('novaSenha').value;
      const confirmar = document.getElementById('confirmarSenha').value;
      const alertDiv = document.getElementById('mensagemResultado');

      alertDiv.style.display = 'none';
      alertDiv.className = 'alert';

      if (novaSenha !== confirmar) {
        alertDiv.classList.add('alert-danger');
        alertDiv.textContent = 'As senhas não conferem';
        alertDiv.style.display = 'block';
        return;
      }

      if (novaSenha.length < 4) {
        alertDiv.classList.add('alert-danger');
        alertDiv.textContent = 'A senha deve ter no mínimo 4 caracteres';
        alertDiv.style.display = 'block';
        return;
      }

      try {
        const resultado = await trocarSenha(email, senhaAtual, novaSenha);

        if (resultado.success) {
          alertDiv.classList.add('alert-success');
          alertDiv.textContent = resultado.message || 'Senha alterada com sucesso';
          document.getElementById('senhaAtual').value = '';
          document.getElementById('novaSenha').value = '';
          document.getElementById('confirmarSenha').value = '';
        } else {
          alertDiv.classList.add('alert-danger');
          alertDiv.textContent = resultado.message || 'Erro ao alterar senha';
        }
      } catch (erro) {
        alertDiv.classList.add('alert-danger');
        alertDiv.textContent = 'Erro inesperado ao alterar senha';
      }

      alertDiv.style.display = 'block';
    }
  </script>
</body>
</html>
