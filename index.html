<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Controle do Escritório</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      padding: 20px;
    }

    .login-card {
      background: #ffffff;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 8px;
    }

    .title {
      font-size: 1.5rem;
      color: #1e293b;
      margin-bottom: 28px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: -20px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #475569;
      font-size: 0.9rem;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #3b82f6;
    }

    .input-icon {
      position: relative;
    }

    .input-icon i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.1rem;
    }

    .btn-entrar {
      width: 100%;
      padding: 14px;
      background: #0d6efd;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-entrar:hover {
      background: #0b5ed7;
      transform: translateY(-1px);
    }

    .btn-entrar:active {
      transform: scale(0.98);
    }

    .btn-entrar:disabled {
      background: #93c5fd;
      cursor: not-allowed;
      transform: none;
    }

    .erro {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 14px;
      display: none;
      background: #fef2f2;
      padding: 10px 14px;
      border-radius: 8px;
      text-align: left;
    }

    .erro i {
      margin-right: 6px;
    }

    .info-text {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 20px;
    }

    .loading {
      display: none;
      margin-top: 10px;
      color: #3b82f6;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🏛️</div>
    <h1 class="title">Controle do Escritório</h1>
    <p class="subtitle">Faça login para acessar o sistema</p>

    <form id="formLogin" onsubmit="event.preventDefault(); logar();">
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="senha" placeholder="Digite sua senha" required>
        </div>
      </div>

      <div class="erro" id="erroLogin">
        <i class="fas fa-exclamation-circle"></i>
        <span id="erroMsg"></span>
      </div>

      <div id="loadingMsg" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Verificando...
      </div>

      <button type="submit" class="btn-entrar">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
    </form>

    <p class="info-text">Sistema de Gestão Financeira</p>
    <p class="info-text">© 2025 Controle do Escritório</p>
  </div>

  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    async function logar() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const erroDiv = document.getElementById('erroLogin');
      const erroMsg = document.getElementById('erroMsg');
      const loading = document.getElementById('loadingMsg');

      erroDiv.style.display = 'none';

      if (!email || !senha) {
        erroMsg.textContent = 'Preencha todos os campos';
        erroDiv.style.display = 'block';
        return;
      }

      loading.style.display = 'block';
      document.querySelector('.btn-entrar').disabled = true;

      try {
        const resultado = await window.fazerLogin(email, senha);

        if (resultado === false) {
          erroMsg.textContent = 'Email ou senha incorretos';
          erroDiv.style.display = 'block';
        }
      } catch (e) {
        erroMsg.textContent = 'Erro ao conectar. Tente novamente.';
        erroDiv.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        document.querySelector('.btn-entrar').disabled = false;
      }
    }

    document.getElementById('formLogin').addEventListener('submit', function(e) {
      e.preventDefault();
      logar();
    });
  </script>
</body>
</html>
