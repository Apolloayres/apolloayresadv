<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Controle do Escritório</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .card h1 {
      margin: 0 0 8px 0;
      font-size: 26px;
      color: #1e3a8a;
    }

    .card p {
      margin: 0 0 28px 0;
      color: #64748b;
      font-size: 15px;
    }

    .input-group {
      position: relative;
      margin-bottom: 18px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #334155;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      color: #1e293b;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 18px;
    }

    .btn-entrar {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 10px;
    }

    .btn-entrar:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .btn-entrar:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-entrar:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .erro-login {
      display: none;
      margin-top: 16px;
      padding: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 14px;
      text-align: left;
    }

    .loading-msg {
      display: none;
      margin-top: 16px;
      color: #3b82f6;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Controle do Escritório</h1>
    <p>Acesse sua conta</p>

    <div class="input-group">
      <label for="email">E-mail</label>
      <div class="input-wrapper">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
    </div>

    <div class="input-group">
      <label for="senha">Senha</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
      </div>
    </div>

    <button class="btn-entrar" onclick="logar()">Entrar</button>

    <div id="loadingMsg" class="loading-msg">Entrando...</div>

    <div id="erroLogin" class="erro-login">
      <span id="erroMsg"></span>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    async function logar() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const erroDiv = document.getElementById('erroLogin');
      const erroMsg = document.getElementById('erroMsg');
      const loading = document.getElementById('loadingMsg');
      const btn = document.querySelector('.btn-entrar');

      erroDiv.style.display = 'none';

      if (!email || !senha) {
        erroMsg.textContent = 'Preencha todos os campos';
        erroDiv.style.display = 'block';
        return;
      }

      loading.style.display = 'block';
      btn.disabled = true;

      const resultado = await window.fazerLogin(email, senha);

      loading.style.display = 'none';
      btn.disabled = false;

      if (!resultado.sucesso) {
        erroMsg.textContent = resultado.mensagem;
        erroDiv.style.display = 'block';
      }
      // Se sucesso, a própria função já redireciona
    }
  </script>

</body>
</html>
