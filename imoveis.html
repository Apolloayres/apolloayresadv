<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle do Escritório - Imóveis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
    }
    nav {
      background: #0a58ca;
      padding: 0 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    nav a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 14px 12px;
      font-weight: 500;
      transition: background 0.2s;
      border-radius: 6px;
    }
    nav a:hover { background: rgba(255,255,255,0.15); }
    nav a.active { background: rgba(255,255,255,0.25); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    h1 { margin-bottom: 20px; color: #0a58ca; }
    .grid3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 18px;
      text-align: center;
    }
    .card h3 { font-size: 0.95rem; color: #666; margin-bottom: 8px; }
    .card .valor { font-size: 2rem; font-weight: 700; color: #0a58ca; }
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #0a58ca; color: #fff; }
    .btn-success { background: #198754; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .table-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #e9ecef; }
    th { background: #f8f9fa; font-weight: 600; color: #555; }
    tr:hover { background: #f8f9fa; }
    .actions { display: flex; gap: 8px; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-disponivel { background: #d1f2eb; color: #117864; }
    .badge-alugado { background: #fadbd8; color: #922b21; }
    .badge-vendido { background: #d6eaf8; color: #1a5276; }
    .empty { text-align: center; padding: 40px; color: #888; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { padding: 18px 20px; border-bottom: 1px solid #e9ecef; }
    .modal-header h2 { font-size: 1.2rem; color: #0a58ca; }
    .modal-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #444; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid #e9ecef;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="clientes.html">Clientes</a></li>
      <li><a href="imoveis.html" class="active">Imóveis</a></li>
      <li><a href="contratos.html">Contratos</a></li>
      <li><a href="pagamentos.html">Pagamentos</a></li>
      <li><a href="despesas.html">Despesas</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1>🏠 Gestão de Imóveis</h1>

    <div class="grid3">
      <div class="card">
        <h3>Imóveis Cadastrados</h3>
        <div class="valor" id="indTotal">0</div>
      </div>
      <div class="card">
        <h3>Alugados</h3>
        <div class="valor" id="indAlugados">0</div>
      </div>
      <div class="card">
        <h3>Disponíveis</h3>
        <div class="valor" id="indDisponiveis">0</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="abrirModal()">+ Novo Imóvel</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Endereço</th>
            <th>Tipo</th>
            <th>Status</th>
            <th>Valor</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaImoveis"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header"><h2 id="modalTitulo">Novo Imóvel</h2></div>
      <div class="modal-body">
        <form id="formImovel">
          <input type="hidden" id="id" />
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" required />
          </div>
          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" required />
          </div>
          <div class="form-group">
            <label for="tipo">Tipo</label>
            <select id="tipo" required>
              <option value="Casa">Casa</option>
              <option value="Apartamento">Apartamento</option>
              <option value="Comercial">Comercial</option>
              <option value="Terreno">Terreno</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="Disponível">Disponível</option>
              <option value="Alugado">Alugado</option>
              <option value="Vendido">Vendido</option>
            </select>
          </div>
          <div class="form-group">
            <label for="valor">Valor</label>
            <input type="text" id="valor" oninput="mascaraMoeda(this)" required />
          </div>
          <div class="form-group">
            <label for="observacao">Observação</label>
            <textarea id="observacao"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-success" onclick="salvarImovel()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'imoveis_controle_escritorio';

    function mascaraMoeda(input) {
      let v = input.value.replace(/\D/g, '');
      if (v.length === 0) { input.value = ''; input.dataset.valor = '0'; return; }
      let inteiro = v.slice(0, -2);
      let centavos = v.slice(-2).padStart(2, '0');
      if (!inteiro || inteiro === '') inteiro = '0';
      inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      input.value = 'R$ ' + inteiro + ',' + centavos;
      input.dataset.valor = (parseInt(v) / 100).toFixed(2);
    }

    function getValorMoeda(input) {
      return parseFloat(input.dataset.valor) || 0;
    }

    function formatarMoeda(valor) {
      const v = Number(valor || 0).toFixed(2).replace(/\D/g, '');
      let inteiro = v.slice(0, -2);
      let centavos = v.slice(-2).padStart(2, '0');
      if (!inteiro || inteiro === '') inteiro = '0';
      inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return 'R$ ' + inteiro + ',' + centavos;
    }

    function getImoveis() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {
        return [];
      }
    }

    function setImoveis(lista) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
    }

    function gerarId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function getClasseBadge(status) {
      if (status === 'Disponível') return 'badge-disponivel';
      if (status === 'Alugado') return 'badge-alugado';
      return 'badge-vendido';
    }

    function renderizar() {
      const lista = getImoveis();
      const tbody = document.getElementById('tabelaImoveis');
      const indTotal = document.getElementById('indTotal');
      const indAlugados = document.getElementById('indAlugados');
      const indDisponiveis = document.getElementById('indDisponiveis');

      indTotal.textContent = lista.length;
      indAlugados.textContent = lista.filter(i => i.status === 'Alugado').length;
      indDisponiveis.textContent = lista.filter(i => i.status === 'Disponível').length;

      if (lista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum imóvel cadastrado.</td></tr>';
        return;
      }

      tbody.innerHTML = lista.map(i => `
        <tr>
          <td>${escapeHtml(i.nome)}</td>
          <td>${escapeHtml(i.endereco)}</td>
          <td>${escapeHtml(i.tipo)}</td>
          <td><span class="badge ${getClasseBadge(i.status)}">${escapeHtml(i.status)}</span></td>
          <td>${formatarMoeda(i.valor)}</td>
          <td class="actions">
            <button class="btn btn-primary" onclick="editarImovel('${i.id}')">Editar</button>
            <button class="btn btn-danger" onclick="excluirImovel('${i.id}')">Excluir</button>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function abrirModal(id = null) {
      document.getElementById('formImovel').reset();
      document.getElementById('valor').dataset.valor = '0';
      document.getElementById('id').value = '';
      document.getElementById('modalTitulo').textContent = id ? 'Editar Imóvel' : 'Novo Imóvel';

      if (id) {
        const imovel = getImoveis().find(i => i.id === id);
        if (!imovel) return;
        document.getElementById('id').value = imovel.id;
        document.getElementById('nome').value = imovel.nome;
        document.getElementById('endereco').value = imovel.endereco;
        document.getElementById('tipo').value = imovel.tipo;
        document.getElementById('status').value = imovel.status;
        document.getElementById('valor').value = formatarMoeda(imovel.valor);
        document.getElementById('valor').dataset.valor = Number(imovel.valor).toFixed(2);
        document.getElementById('observacao').value = imovel.observacao || '';
      }

      document.getElementById('modalOverlay').classList.add('active');
    }

    function fecharModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function salvarImovel() {
      const id = document.getElementById('id').value;
      const nome = document.getElementById('nome').value.trim();
      const endereco = document.getElementById('endereco').value.trim();
      const tipo = document.getElementById('tipo').value;
      const status = document.getElementById('status').value;
      const valor = getValorMoeda(document.getElementById('valor'));
      const observacao = document.getElementById('observacao').value.trim();

      if (!nome || !endereco || !document.getElementById('valor').value.trim()) {
        alert('Preencha os campos obrigatórios.');
        return;
      }

      let lista = getImoveis();
      if (id) {
        const idx = lista.findIndex(i => i.id === id);
        if (idx >= 0) {
          lista[idx] = { id, nome, endereco, tipo, status, valor, observacao };
        }
      } else {
        lista.push({ id: gerarId(), nome, endereco, tipo, status, valor, observacao });
      }

      setImoveis(lista);
      fecharModal();
      renderizar();
    }

    function editarImovel(id) {
      abrirModal(id);
    }

    function excluirImovel(id) {
      if (!confirm('Deseja realmente excluir este imóvel?')) return;
      setImoveis(getImoveis().filter(i => i.id !== id));
      renderizar();
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) fecharModal();
    });

    renderizar();
  </script>
</body>
</html>
