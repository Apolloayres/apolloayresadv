<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contas Bancárias - Controle do Escritório</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      color: #333;
      line-height: 1.5;
    }
    .navbar {
      background-color: #0a58ca;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .navbar-brand {
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
    }
    .navbar-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .navbar-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.9;
      transition: opacity 0.2s;
    }
    .navbar-links a:hover { opacity: 1; text-decoration: underline; }
    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 16px; color: #222; }
    .indicators {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }
    .card-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0a58ca;
    }
    .card-label {
      font-size: 0.85rem;
      color: #666;
      margin-top: 4px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background-color: #0a58ca;
      color: #fff;
    }
    .btn-primary:hover { background-color: #0846a0; }
    .btn-secondary {
      background-color: #6c757d;
      color: #fff;
    }
    .btn-secondary:hover { background-color: #5a6268; }
    .btn-danger {
      background-color: #dc3545;
      color: #fff;
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    .btn-danger:hover { background-color: #c82333; }
    .btn-edit {
      background-color: #ffc107;
      color: #212529;
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    .btn-edit:hover { background-color: #e0a800; }
    .table-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.9rem;
      border-bottom: 1px solid #e9ecef;
    }
    th {
      background-color: #f8f9fa;
      font-weight: 600;
      color: #555;
    }
    tr:hover { background-color: #f8f9fa; }
    .actions { display: flex; gap: 6px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-yes { background: #d1e7dd; color: #0f5132; }
    .badge-no { background: #f8d7da; color: #842029; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .modal h2 { margin-bottom: 16px; font-size: 1.3rem; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: 0.85rem; font-weight: 600; color: #555; }
    .form-group input[type="text"],
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .form-group input[type="text"]:focus,
    .form-group select:focus {
      outline: none;
      border-color: #0a58ca;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
    .checkbox-group label { margin: 0; font-weight: 500; cursor: pointer; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      th, td { padding: 10px; font-size: 0.8rem; }
      .navbar { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="navbar-brand">Controle do Escritório</a>
    <div class="navbar-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="clientes.html">Clientes</a>
      <a href="servicos.html">Serviços</a>
      <a href="contratos.html">Contratos</a>
      <a href="financeiro.html">Financeiro</a>
      <a href="contas_bancarias.html">Contas Bancárias</a>
      <a href="usuarios.html">Usuários</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="configuracoes.html">Configurações</a>
    </div>
  </nav>

  <div class="container">
    <h1>🏦 Contas Bancárias</h1>

    <div class="indicators">
      <div class="card">
        <span class="card-value" id="totalContas">0</span>
        <span class="card-label">Total Contas</span>
      </div>
      <div class="card">
        <span class="card-value" id="saldoTotal">R$ 0,00</span>
        <span class="card-label">Saldo Total</span>
      </div>
      <div class="card">
        <span class="card-value" id="contaPrincipal">-</span>
        <span class="card-label">Conta Principal</span>
      </div>
      <div class="card">
        <span class="card-value" id="contasAtivas">0</span>
        <span class="card-label">Ativas</span>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="abrirModal()">+ Nova Conta</button>
    </div>

    <div class="table-card">
      <table id="tabelaContas">
        <thead>
          <tr>
            <th>Banco</th>
            <th>Tipo</th>
            <th>Agência</th>
            <th>Conta</th>
            <th>Titular</th>
            <th>Saldo</th>
            <th>Principal</th>
            <th>Ativa</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitulo">Nova Conta</h2>
      <form id="formConta" onsubmit="salvarConta(event)">
        <input type="hidden" id="idConta">

        <div class="form-group">
          <label for="banco">Banco</label>
          <input type="text" id="banco" required placeholder="Ex: Banco do Brasil">
        </div>

        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" required>
            <option value="Corrente">Corrente</option>
            <option value="Poupança">Poupança</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="agencia">Agência</label>
            <input type="text" id="agencia" required placeholder="Ex: 1234-5">
          </div>
          <div class="form-group">
            <label for="conta">Conta</label>
            <input type="text" id="conta" required placeholder="Ex: 67890-1">
          </div>
        </div>

        <div class="form-group">
          <label for="titular">Titular</label>
          <input type="text" id="titular" required placeholder="Nome do titular">
        </div>

        <div class="form-group">
          <label for="saldo">Saldo</label>
          <input type="text" id="saldo" required placeholder="R$ 0,00" oninput="mascaraMoeda(this)">
        </div>

        <div class="form-row">
          <div class="form-group">
            <div class="checkbox-group">
              <input type="checkbox" id="principal">
              <label for="principal">Conta Principal</label>
            </div>
          </div>
          <div class="form-group">
            <div class="checkbox-group">
              <input type="checkbox" id="ativa" checked>
              <label for="ativa">Ativa</label>
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let contas = [
      { id: 1, banco: 'Banco do Brasil', tipo: 'Corrente', agencia: '1234-5', conta: '67890-1', titular: 'Escritório Contábil Ltda', saldo: 15230.50, principal: true, ativa: true },
      { id: 2, banco: 'Itaú', tipo: 'Poupança', agencia: '4321-0', conta: '98765-4', titular: 'Escritório Contábil Ltda', saldo: 4250.75, principal: false, ativa: true },
      { id: 3, banco: 'Caixa Econômica', tipo: 'Corrente', agencia: '1111-2', conta: '22222-3', titular: 'João da Silva', saldo: 0.00, principal: false, ativa: false }
    ];

    function formatarMoeda(valor) {
      let v = Math.round((parseFloat(valor) || 0) * 100).toString().padStart(3, '0');
      let inteiro = v.slice(0, -2);
      let centavos = v.slice(-2);
      inteiro = parseInt(inteiro, 10).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return 'R$ ' + inteiro + ',' + centavos;
    }

    function mascaraMoeda(input) {
      let v = input.value.replace(/\D/g, '');
      if (v.length === 0) { input.value = ''; input.dataset.valor = '0'; return; }
      let inteiro = v.slice(0, -2);
      let centavos = v.slice(-2).padStart(2, '0');
      if (!inteiro || inteiro === '') inteiro = '0';
      inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      input.value = 'R$ ' + inteiro + ',' + centavos;
      input.dataset.valor = (parseInt(v) / 100).toFixed(2);
    }

    function getValorMoeda(input) {
      return parseFloat(input.dataset.valor) || 0;
    }

    function abrirModal(id = null) {
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('modalTitulo').textContent = id ? 'Editar Conta' : 'Nova Conta';
      document.getElementById('formConta').reset();
      document.getElementById('saldo').dataset.valor = '0';
      document.getElementById('ativa').checked = true;
      document.getElementById('idConta').value = '';

      if (id) {
        const conta = contas.find(c => c.id === id);
        if (conta) {
          document.getElementById('idConta').value = conta.id;
          document.getElementById('banco').value = conta.banco;
          document.getElementById('tipo').value = conta.tipo;
          document.getElementById('agencia').value = conta.agencia;
          document.getElementById('conta').value = conta.conta;
          document.getElementById('titular').value = conta.titular;
          document.getElementById('saldo').value = formatarMoeda(conta.saldo);
          mascaraMoeda(document.getElementById('saldo'));
          document.getElementById('principal').checked = conta.principal;
          document.getElementById('ativa').checked = conta.ativa;
        }
      }
    }

    function fecharModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('formConta').reset();
      document.getElementById('saldo').dataset.valor = '0';
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) fecharModal();
    });

    function salvarConta(event) {
      event.preventDefault();
      const id = parseInt(document.getElementById('idConta').value) || null;
      const saldo = getValorMoeda(document.getElementById('saldo'));

      const novaConta = {
        id: id || Date.now(),
        banco: document.getElementById('banco').value.trim(),
        tipo: document.getElementById('tipo').value,
        agencia: document.getElementById('agencia').value.trim(),
        conta: document.getElementById('conta').value.trim(),
        titular: document.getElementById('titular').value.trim(),
        saldo: saldo,
        principal: document.getElementById('principal').checked,
        ativa: document.getElementById('ativa').checked
      };

      if (novaConta.principal) {
        contas.forEach(c => c.principal = false);
      }

      if (id) {
        const index = contas.findIndex(c => c.id === id);
        if (index !== -1) contas[index] = novaConta;
      } else {
        contas.push(novaConta);
      }

      fecharModal();
      renderizar();
    }

    function excluirConta(id) {
      if (confirm('Deseja realmente excluir esta conta?')) {
        contas = contas.filter(c => c.id !== id);
        renderizar();
      }
    }

    function renderizar() {
      const corpo = document.getElementById('corpoTabela');
      corpo.innerHTML = '';
      let saldoTotal = 0;
      let ativas = 0;
      let principalNome = '-';

      contas.forEach(conta => {
        saldoTotal += parseFloat(conta.saldo) || 0;
        if (conta.ativa) ativas++;
        if (conta.principal) principalNome = conta.banco;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${conta.banco}</td>
          <td>${conta.tipo}</td>
          <td>${conta.agencia}</td>
          <td>${conta.conta}</td>
          <td>${conta.titular}</td>
          <td>${formatarMoeda(conta.saldo)}</td>
          <td><span class="badge ${conta.principal ? 'badge-yes' : 'badge-no'}">${conta.principal ? 'Sim' : 'Não'}</span></td>
          <td><span class="badge ${conta.ativa ? 'badge-yes' : 'badge-no'}">${conta.ativa ? 'Sim' : 'Não'}</span></td>
          <td class="actions">
            <button class="btn btn-edit" onclick="abrirModal(${conta.id})">Editar</button>
            <button class="btn btn-danger" onclick="excluirConta(${conta.id})">Excluir</button>
          </td>
        `;
        corpo.appendChild(tr);
      });

      document.getElementById('totalContas').textContent = contas.length;
      document.getElementById('saldoTotal').textContent = formatarMoeda(saldoTotal);
      document.getElementById('contaPrincipal').textContent = principalNome;
      document.getElementById('contasAtivas').textContent = ativas;
    }

    renderizar();
  </script>

</body>
</html>
