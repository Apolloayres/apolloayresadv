<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo de Caixa - Controle do Escritório</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .topo-logo { background-color: #fff; padding: 15px 20px; display: flex; justify-content: center; align-items: center; }
    .logo-escritorio { height: 70px; width: auto; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; color: #333; }
    .navbar { background: #0a58ca; color: white; padding: 0 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .navbar ul { display: flex; align-items: center; list-style: none; height: 56px; }
    .navbar li { margin-right: 24px; }
    .navbar a { color: white; text-decoration: none; font-weight: 500; font-size: 15px; transition: opacity .2s; }
    .navbar a:hover { opacity: 0.8; }
    .navbar .brand { font-weight: 700; font-size: 18px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    .header-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 20px; }
    .header-actions h1 { flex: 1 1 100%; font-size: 26px; margin-bottom: 8px; color: #0a58ca; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; transition: background .2s, transform .1s; text-decoration: none; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: #0a58ca; color: white; }
    .btn-primary:hover { background: #0846a3; }
    .btn-secondary { background: #e9ecef; color: #333; }
    .btn-secondary:hover { background: #dde2e6; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-danger:hover { background: #b02a37; }
    .btn-sm { padding: 6px 10px; font-size: 13px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: white; border-radius: 8px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 13px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .card-value { font-size: 22px; font-weight: 700; }
    .card-receita { border-left: 5px solid #198754; }
    .card-receita .card-value { color: #198754; }
    .card-despesa { border-left: 5px solid #dc3545; }
    .card-despesa .card-value { color: #dc3545; }
    .card-saldo { border-left: 5px solid #0a58ca; }
    .card-saldo .card-value { color: #0a58ca; }
    .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .filter-bar label { font-weight: 600; font-size: 14px; }
    .filter-bar input[type="month"] { padding: 8px 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; }
    .table-responsive { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    th, td { padding: 14px 16px; text-align: left; font-size: 14px; }
    th { background: #f8f9fa; color: #495057; font-weight: 700; border-bottom: 2px solid #dee2e6; }
    tbody tr { border-bottom: 1px solid #eceff2; }
    tbody tr:hover { background: #f8f9fa; }
    .tipo-receita { color: #198754; font-weight: 700; }
    .tipo-despesa { color: #dc3545; font-weight: 700; }
    .valor { font-weight: 600; }
    .total-row { font-weight: 700; background: #e9ecef; }
    .empty { text-align: center; padding: 40px; color: #6c757d; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 10px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.2); animation: slideUp .3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { padding: 18px 20px 0; display: flex; justify-content: space-between; align-items: flex-start; }
    .modal-header h2 { font-size: 18px; color: #0a58ca; }
    .modal-close { font-size: 24px; color: #999; cursor: pointer; line-height: 1; background: none; border: none; }
    .modal-body { padding: 16px 20px 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #495057; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #0a58ca; box-shadow: 0 0 0 3px rgba(10,88,202,0.15); }
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
    .hidden { display: none !important; }
    @media (max-width: 600px) {
      .navbar ul { flex-wrap: wrap; height: auto; padding: 10px 0; }
      .navbar li { margin: 6px 12px 6px 0; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topo-logo">
    <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/apolloayres%40yahoo.com.br/png/image-019eea86-df20-753e-b049-a7c4515d7a68.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260621%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260621T160143Z&X-Amz-Expires=3600&X-Amz-Signature=d86ac73935a9237a01f8898aab4f62b0c323de884239f0049abf5a99c09677ae&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Apollo Ayres" class="logo-escritorio">
  </div>
  <nav class="navbar">
    <ul>
      <li class="brand"><a href="home.html">🏢 Controle do Escritório</a></li>
      <li><a href="home.html">Início</a></li>
      <li><a href="clientes.html">Clientes</a></li>
      <li><a href="servicos.html">Serviços</a></li>
      <li><a href="fluxo-caixa.html">Fluxo de Caixa</a></li>
    </ul>
  </nav>
  <div class="container">
    <div class="header-actions">
      <h1>📈 Fluxo de Caixa</h1>
      <a href="home.html" class="btn btn-secondary">← Voltar</a>
      <button class="btn btn-primary" onclick="abrirModal()">+ Nova Movimentação</button>
    </div>
    <div class="cards">
      <div class="card card-receita"><div class="card-title">Total Receitas</div><div class="card-value" id="totalReceitas">R$ 0,00</div></div>
      <div class="card card-despesa"><div class="card-title">Total Despesas</div><div class="card-value" id="totalDespesas">R$ 0,00</div></div>
      <div class="card card-saldo"><div class="card-title">Saldo do Período</div><div class="card-value" id="saldoPeriodo">R$ 0,00</div></div>
    </div>
    <div class="filter-bar">
      <label for="filtroMes">Filtrar por mês/ano:</label>
      <input type="month" id="filtroMes" onchange="renderizar()">
    </div>
    <div class="table-responsive">
      <table id="tabelaFluxo">
        <thead><tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Categoria</th><th>Forma de Pagamento</th><th>Valor</th><th>Saldo Acumulado</th><th>Ações</th></tr></thead>
        <tbody id="corpoTabela"><tr><td colspan="8" class="empty">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="modal-overlay" id="modalOverlay" onclick="fecharModalOverlay(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h2 id="tituloModal">Nova Movimentação</h2><button class="modal-close" onclick="fecharModal()">&times;</button></div>
      <div class="modal-body">
        <form id="formMovimentacao" onsubmit="salvar(event)">
          <input type="hidden" id="id">
          <div class="form-group"><label for="tipo">Tipo *</label><select id="tipo" required onchange="adaptarCampos()"><option value="">Selecione</option><option value="RECEITA">RECEITA</option><option value="DESPESA">DESPESA</option></select></div>
          <div class="form-group"><label for="descricao">Descrição</label><input type="text" id="descricao" placeholder="Ex: Venda de serviço, pagamento de aluguel"></div>
          <div class="form-group"><label for="valor">Valor (R$) *</label><input type="number" id="valor" step="0.01" min="0.01" required placeholder="0,00"></div>
          <div class="form-group"><label for="data">Data *</label><input type="date" id="data" required></div>
          <div class="form-group"><label for="categoria">Categoria</label><select id="categoria"><option value="">Selecione</option><option value="Serviços">Serviços</option><option value="Vendas">Vendas</option><option value="Impostos">Impostos</option><option value="Aluguel">Aluguel</option><option value="Salários">Salários</option><option value="Fornecedores">Fornecedores</option><option value="Transporte">Transporte</option><option value="Outros">Outros</option></select></div>
          <div class="form-group"><label for="forma_pagamento">Forma de Pagamento</label><select id="forma_pagamento"><option value="">Selecione</option><option value="Dinheiro">Dinheiro</option><option value="Pix">Pix</option><option value="Cartão de Crédito">Cartão de Crédito</option><option value="Cartão de Débito">Cartão de Débito</option><option value="Boleto">Boleto</option><option value="Transferência">Transferência</option><option value="Outro">Outro</option></select></div>
          <div class="form-group hidden" id="grupoStatus"><label for="status">Status</label><select id="status"><option value="Pendente">Pendente</option><option value="Paga">Paga</option></select></div>
          <div class="form-actions"><button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button><button type="submit" class="btn btn-primary">Salvar</button></div>
        </form>
      </div>
    </div>
  </div>
  <script src="db.js"></script>
  <script>
    const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
    let movimentacoes = [];
    let editandoId = null;
    const STORAGE_KEY = 'fluxo_caixa';
    function getData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch(e){return [];} }
    function setData(v) { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); }
    function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
    function adaptarCampos() {
      const tipo = document.getElementById('tipo').value;
      document.getElementById('grupoStatus').classList.toggle('hidden', tipo !== 'DESPESA');
      if (tipo === 'RECEITA') document.getElementById('status').value = 'Paga';
    }
    function abrirModal(dados) {
      editandoId = null;
      document.getElementById('formMovimentacao').reset();
      document.getElementById('id').value = '';
      document.getElementById('data').value = new Date().toISOString().split('T')[0];
      document.getElementById('tituloModal').textContent = 'Nova Movimentação';
      if (dados) {
        editandoId = dados.id;
        document.getElementById('id').value = dados.id;
        document.getElementById('tipo').value = dados.tipo;
        document.getElementById('descricao').value = dados.descricao;
        document.getElementById('valor').value = dados.valor;
        document.getElementById('data').value = dados.data;
        document.getElementById('categoria').value = dados.categoria;
        document.getElementById('forma_pagamento').value = dados.forma_pagamento;
        document.getElementById('status').value = dados.status;
        document.getElementById('tituloModal').textContent = 'Editar Movimentação';
        adaptarCampos();
      }
      document.getElementById('modalOverlay').classList.add('active');
    }
    function fecharModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    function fecharModalOverlay(e) { if (e.target === e.currentTarget) fecharModal(); }
    function salvar(e) {
      e.preventDefault();
      const obj = {
        id: editandoId || genId(),
        tipo: document.getElementById('tipo').value,
        descricao: document.getElementById('descricao').value,
        valor: parseFloat(document.getElementById('valor').value)||0,
        data: document.getElementById('data').value,
        categoria: document.getElementById('categoria').value,
        forma_pagamento: document.getElementById('forma_pagamento').value,
        status: document.getElementById('status').value
      };
      if (editandoId) { const i = movimentacoes.findIndex(m=>m.id===editandoId); if(i>=0) movimentacoes[i]=obj; else movimentacoes.push(obj); }
      else movimentacoes.push(obj);
      setData(movimentacoes);
      fecharModal();
      renderizar();
    }
    function excluir(id, tipo) {
      if (!confirm('Excluir esta movimentação?')) return;
      movimentacoes = movimentacoes.filter(m => m.id !== id);
      setData(movimentacoes);
      renderizar();
    }
    function renderizar() {
      const filtroMes = document.getElementById('filtroMes').value;
      let lista = movimentacoes;
      if (filtroMes) lista = lista.filter(m => m.data && m.data.startsWith(filtroMes));
      const receitas = lista.filter(m => m.tipo === 'RECEITA').reduce((s,m) => s + (m.valor||0), 0);
      const despesas = lista.filter(m => m.tipo === 'DESPESA').reduce((s,m) => s + (m.valor||0), 0);
      document.getElementById('totalReceitas').textContent = fmt.format(receitas);
      document.getElementById('totalDespesas').textContent = fmt.format(despesas);
      document.getElementById('saldoPeriodo').textContent = fmt.format(receitas - despesas);
      const ordenadas = [...lista].sort((a,b) => new Date(b.data||0) - new Date(a.data||0));
      let acumulado = 0;
      const tbody = document.getElementById('corpoTabela');
      if (ordenadas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhuma movimentação encontrada.</td></tr>';
        return;
      }
      tbody.innerHTML = '';
      ordenadas.forEach(m => {
        const tr = document.createElement('tr');
        const valor = m.valor||0;
        const tipoClass = m.tipo === 'RECEITA' ? 'tipo-receita' : 'tipo-despesa';
        acumulado += m.tipo === 'RECEITA' ? valor : -valor;
        tr.innerHTML = `
          <td>${new Date(m.data+'T12:00:00').toLocaleDateString('pt-BR')}</td>
          <td>${m.descricao||'—'}</td>
          <td class="${tipoClass}">${m.tipo}</td>
          <td>${m.categoria||'—'}</td>
          <td>${m.forma_pagamento||'—'}</td>
          <td class="valor ${tipoClass}">${fmt.format(valor)}</td>
          <td class="valor">${fmt.format(acumulado)}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick='abrirModal(${JSON.stringify(m).replace(/'/g, "&;")})'>Editar</button>
            <button class="btn btn-danger btn-sm" onclick="excluir('${m.id}', '${m.tipo}')">Excluir</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }
    document.addEventListener('DOMContentLoaded', () => {
      movimentacoes = getData();
      const hoje = new Date();
      document.getElementById('filtroMes').value = hoje.toISOString().slice(0,7);
      renderizar();
    });
  </script>
</body>
</html>
