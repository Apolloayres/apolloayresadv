<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo de Caixa - Controle do Escritório</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f6ff;
      color: #1a3a5c;
      min-height: 100vh;
    }
    .navbar {
      background: #0a58ca;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }
    .navbar-brand {
      font-size: 1.25rem;
      font-weight: 600;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .title {
      font-size: 1.6rem;
      color: #0a58ca;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0a58ca;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .btn-back:hover {
      background: #0846a3;
      transform: translateX(-2px);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(10, 88, 202, 0.1);
      border-left: 5px solid #0a58ca;
    }
    .card.receitas {
      border-left-color: #198754;
    }
    .card.despesas {
      border-left-color: #dc3545;
    }
    .card.saldo {
      border-left-color: #0a58ca;
    }
    .card-label {
      font-size: 0.85rem;
      color: #6c88a8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-value {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .receitas .card-value { color: #198754; }
    .despesas .card-value { color: #dc3545; }
    .saldo .card-value { color: #0a58ca; }
    .filtro {
      background: #fff;
      border-radius: 8px;
      padding: 16px 20px;
      box-shadow: 0 2px 8px rgba(10, 88, 202, 0.1);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filtro label {
      font-weight: 600;
      color: #0a58ca;
    }
    .filtro input[type="month"] {
      border: 1px solid #b6d0f7;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: #1a3a5c;
      background: #f8fbff;
      outline: none;
    }
    .filtro input[type="month"]:focus {
      border-color: #0a58ca;
    }
    .table-wrapper {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(10, 88, 202, 0.1);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #0a58ca;
      color: #fff;
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.95rem;
    }
    tbody tr:nth-child(even) {
      background: #f3f8ff;
    }
    tbody tr:hover {
      background: #e6f0ff;
    }
    .tipo-receita {
      color: #198754;
      font-weight: 600;
    }
    .tipo-despesa {
      color: #dc3545;
      font-weight: 600;
    }
    .valor-receita { color: #198754; font-weight: 600; }
    .valor-despesa { color: #dc3545; font-weight: 600; }
    .valor-saldo { color: #0a58ca; font-weight: 700; }
    .empty {
      text-align: center;
      padding: 28px;
      color: #6c88a8;
    }
    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: flex-start; }
      th, td { padding: 10px 12px; font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Controle do Escritório</div>
  </nav>

  <div class="container">
    <div class="header">
      <h1 class="title">📈 Fluxo de Caixa</h1>
      <a href="home.html" class="btn-back">← Voltar</a>
    </div>

    <div class="cards">
      <div class="card receitas">
        <div class="card-label">Total Receitas</div>
        <div class="card-value" id="totalReceitas">R$ 0,00</div>
      </div>
      <div class="card despesas">
        <div class="card-label">Total Despesas</div>
        <div class="card-value" id="totalDespesas">R$ 0,00</div>
      </div>
      <div class="card saldo">
        <div class="card-label">Saldo do Período</div>
        <div class="card-value" id="saldoPeriodo">R$ 0,00</div>
      </div>
    </div>

    <div class="filtro">
      <label for="filtroMes">Filtrar por mês/ano:</label>
      <input type="month" id="filtroMes" />
    </div>

    <div class="table-wrapper">
      <table id="tabelaFluxo">
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Tipo</th>
            <th>Valor</th>
            <th>Saldo Acumulado</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function formatarData(dataISO) {
      if (!dataISO) return '';
      const d = new Date(dataISO + 'T00:00:00');
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function formatarMoeda(valor) {
      return 'R$ ' + Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function obterMovimentacoes(receitas, despesas) {
      const movimentacoes = [];

      receitas.forEach(item => {
        movimentacoes.push({
          id: item.id,
          data: item.data,
          descricao: item.descricao,
          tipo: 'Receita',
          valor: Number(item.valor)
        });
      });

      despesas.forEach(item => {
        movimentacoes.push({
          id: item.id,
          data: item.data,
          descricao: item.descricao,
          tipo: 'Despesa',
          valor: Number(item.valor)
        });
      });

      movimentacoes.sort((a, b) => new Date(a.data) - new Date(b.data));
      return movimentacoes;
    }

    function filtrarPorMes(movimentacoes, mesAno) {
      if (!mesAno) return movimentacoes;
      return movimentacoes.filter(m => m.data && m.data.startsWith(mesAno));
    }

    function calcularSaldos(movimentacoes) {
      let saldoAcumulado = 0;
      return movimentacoes.map(m => {
        saldoAcumulado += m.tipo === 'Receita' ? m.valor : -m.valor;
        return { ...m, saldoAcumulado };
      });
    }

    function renderizar(movimentacoes) {
      const totalReceitas = movimentacoes
        .filter(m => m.tipo === 'Receita')
        .reduce((s, m) => s + m.valor, 0);
      const totalDespesas = movimentacoes
        .filter(m => m.tipo === 'Despesa')
        .reduce((s, m) => s + m.valor, 0);
      const saldoPeriodo = totalReceitas - totalDespesas;

      document.getElementById('totalReceitas').textContent = formatarMoeda(totalReceitas);
      document.getElementById('totalDespesas').textContent = formatarMoeda(totalDespesas);
      document.getElementById('saldoPeriodo').textContent = formatarMoeda(saldoPeriodo);

      const corpo = document.getElementById('corpoTabela');
      corpo.innerHTML = '';

      if (movimentacoes.length === 0) {
        corpo.innerHTML = '<tr><td colspan="5" class="empty">Nenhuma movimentação encontrada para o período.</td></tr>';
        return;
      }

      const comSaldo = calcularSaldos(movimentacoes);

      comSaldo.forEach(m => {
        const linha = document.createElement('tr');
        const classeTipo = m.tipo === 'Receita' ? 'tipo-receita' : 'tipo-despesa';
        const classeValor = m.tipo === 'Receita' ? 'valor-receita' : 'valor-despesa';
        linha.innerHTML = `
          <td>${formatarData(m.data)}</td>
          <td>${m.descricao}</td>
          <td class="${classeTipo}">${m.tipo}</td>
          <td class="${classeValor}">${formatarMoeda(m.valor)}</td>
          <td class="valor-saldo">${formatarMoeda(m.saldoAcumulado)}</td>
        `;
        corpo.appendChild(linha);
      });
    }

    let todasMovimentacoes = [];

    function carregar() {
      try {
        const receitas = window.db && typeof window.db.receitas_listar === 'function'
          ? window.db.receitas_listar() : [];
        const despesas = window.db && typeof window.db.despesas_listar === 'function'
          ? window.db.despesas_listar() : [];
        todasMovimentacoes = obterMovimentacoes(receitas || [], despesas || []);

        const hoje = new Date();
        const mesAtual = hoje.toISOString().slice(0, 7);
        document.getElementById('filtroMes').value = mesAtual;
        renderizar(filtrarPorMes(todasMovimentacoes, mesAtual));
      } catch (e) {
        console.error('Erro ao carregar fluxo de caixa:', e);
      }
    }

    document.getElementById('filtroMes').addEventListener('change', function () {
      renderizar(filtrarPorMes(todasMovimentacoes, this.value));
    });

    document.addEventListener('DOMContentLoaded', carregar);
  </script>
</body>
</html>
