<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing - Controle do Escritório</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
    .navbar { background: #0a58ca; padding: 0 20px; }
    .navbar ul { list-style: none; display: flex; flex-wrap: wrap; align-items: center; }
    .navbar li { margin: 0; }
    .navbar a { display: block; color: #fff; text-decoration: none; padding: 14px 16px; font-size: 14px; transition: background 0.2s; }
    .navbar a:hover, .navbar a.active { background: rgba(255,255,255,0.2); }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .page-title { margin-bottom: 20px; font-size: 24px; color: #0a58ca; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 8px; padding: 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .card h3 { font-size: 13px; color: #666; margin-bottom: 8px; text-transform: uppercase; }
    .card p { font-size: 22px; font-weight: bold; color: #0a58ca; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 6px; padding: 10px 18px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .btn-primary { background: #0a58ca; color: #fff; }
    .btn-primary:hover { background: #084298; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-secondary:hover { background: #565e64; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-danger:hover { background: #bb2d3b; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .table-wrap { background: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    th { background: #0a58ca; color: #fff; font-weight: 600; }
    tr:hover { background: #f8f9fa; }
    .actions { display: flex; gap: 8px; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; display: inline-block; }
    .badge-ativa { background: #d1f2eb; color: #117a65; }
    .badge-pausada { background: #fef9e7; color: #9a7d0a; }
    .badge-encerrada { background: #fadbd8; color: #922b21; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 1000; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal { background: #fff; border-radius: 10px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header { background: #0a58ca; color: #fff; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 18px; }
    .modal-close { background: transparent; border: none; color: #fff; font-size: 24px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 14px 20px; background: #f8f9fa; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #e5e7eb; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
    .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #0a58ca; box-shadow: 0 0 0 3px rgba(10,88,202,0.15); }
    .form-group.full { grid-column: 1 / -1; }
    .empty { text-align: center; padding: 30px; color: #666; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .modal { max-width: 95%; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="cadastros.html">Cadastros</a></li>
      <li><a href="financeiro.html">Financeiro</a></li>
      <li><a href="fluxo-caixa.html">Fluxo de Caixa</a></li>
      <li><a href="marketing.html" class="active">Marketing</a></li>
      <li><a href="patrimonio.html">Patrimônio</a></li>
      <li><a href="proventos.html">Proventos</a></li>
      <li><a href="relatorios-gerenciais.html">Rel. Gerenciais</a></li>
      <li><a href="usuarios.html">Usuários</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title">Marketing</h1>

    <div class="cards">
      <div class="card">
        <h3>Campanhas Ativas</h3>
        <p id="campanhasAtivas">0</p>
      </div>
      <div class="card">
        <h3>Investimento Total</h3>
        <p id="investimentoTotal">R$ 0,00</p>
      </div>
      <div class="card">
        <h3>ROI Médio</h3>
        <p id="roiMedio">0%</p>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" id="filtroCampanha" placeholder="Buscar campanha..." style="padding:10px 12px;border:1px solid #ced4da;border-radius:6px;font-size:14px;flex:1;max-width:320px;" />
      <div class="d-flex gap-2">
        <button class="btn btn-primary" onclick="abrirModal()">Nova Campanha</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Campanha</th>
            <th>Tipo</th>
            <th>Investimento</th>
            <th>Resultado</th>
            <th>ROI(%)</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaCampanhas">
          <tr><td colspan="7" class="empty">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitulo">Nova Campanha</h2>
        <button class="modal-close" onclick="fecharModal()">&times;</button>
      </div>
      <form id="formCampanha">
        <div class="modal-body">
          <input type="hidden" id="campanhaId" />
          <div class="form-row">
            <div class="form-group full">
              <label for="campanha">Nome da Campanha</label>
              <input type="text" id="campanha" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="tipo">Tipo</label>
              <select id="tipo" required>
                <option value="">Selecione</option>
                <option value="Redes Sociais">Redes Sociais</option>
                <option value="Google Ads">Google Ads</option>
                <option value="E-mail Marketing">E-mail Marketing</option>
                <option value="Evento">Evento</option>
                <option value="Site">Site</option>
                <option value="Panfletos">Panfletos</option>
                <option value="Indicação">Indicação</option>
                <option value="Outros">Outros</option>
              </select>
            </div>
            <div class="form-group">
              <label>Período da Campanha</label>
              <div style="display:flex;gap:10px;">
                <input type="date" id="data_inicio" required style="flex:1;" />
                <span style="margin-top:8px;">a</span>
                <input type="date" id="data_fim" required style="flex:1;" />
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="investimento">Investimento</label>
              <input type="text" id="investimento" class="moeda" required placeholder="R$ 0,00" />
            </div>
            <div class="form-group">
              <label for="valor_estimado">Valor Estimado</label>
              <input type="text" id="valor_estimado" class="moeda" placeholder="R$ 0,00" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="valor_gasto">Valor Gasto</label>
              <input type="text" id="valor_gasto" class="moeda" placeholder="R$ 0,00" />
            </div>
            <div class="form-group">
              <label for="roi">ROI (%)</label>
              <input type="number" id="roi" step="0.1" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label for="resultado">Resultado</label>
              <input type="text" id="resultado" placeholder="Ex: 150 leads, 25 vendas" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label for="status">Status</label>
              <select id="status" required>
                <option value="">Selecione</option>
                <option value="Ativa">Ativa</option>
                <option value="Pausada">Pausada</option>
                <option value="Encerrada">Encerrada</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="limparFormulario()">Limpar</button>
          <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let campanhasCache = [];

    document.addEventListener('DOMContentLoaded', () => {
      listarCampanhas();
      aplicarMascaraMoeda();
      document.getElementById('formCampanha').addEventListener('submit', salvarCampanha);
      document.getElementById('filtroCampanha').addEventListener('input', filtrarTabela);
    });

    function formatarMoeda(valor) {
      if (valor === null || valor === undefined) return 'R$ 0,00';
      const numero = typeof valor === 'number' ? valor : parseFloat(String(valor).replace(/[^\d,.-]/g, '').replace(/\./g, '').replace(',', '.'));
      if (isNaN(numero)) return 'R$ 0,00';
      return numero.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function getValorMoeda(input) {
      if (!input || !input.value) return 0;
      const limpo = input.value.replace(/[^\d,]/g, '').replace(',', '.');
      return parseFloat(limpo) || 0;
    }

    function aplicarMascaraMoeda() {
      document.querySelectorAll('.moeda').forEach(input => {
        input.addEventListener('input', function () {
          let valor = this.value.replace(/[^\d]/g, '');
          valor = (parseInt(valor || '0', 10) / 100).toFixed(2);
          this.value = Number(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        });
      });
    }

    function abrirModal(id = null) {
      limparFormulario();
      if (id) {
        const c = campanhasCache.find(x => String(x.id) === String(id));
        if (c) {
          document.getElementById('modalTitulo').textContent = 'Editar Campanha';
          document.getElementById('campanhaId').value = c.id || '';
          document.getElementById('campanha').value = c.campanha || '';
          document.getElementById('tipo').value = c.tipo || '';
          document.getElementById('data_inicio').value = c.data_inicio || '';
          document.getElementById('data_fim').value = c.data_fim || '';
          const inv = document.getElementById('investimento');
          const invest = parseFloat(c.investimento || 0);
          inv.value = invest.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          const est = document.getElementById('valor_estimado');
          const estimado = parseFloat(c.valor_estimado || 0);
          est.value = estimado.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          const gast = document.getElementById('valor_gasto');
          const gasto = parseFloat(c.valor_gasto || 0);
          gast.value = gasto.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          document.getElementById('resultado').value = c.resultado || '';
          document.getElementById('roi').value = c.roi || '';
          document.getElementById('status').value = c.status || '';
        }
      }
      document.getElementById('modalOverlay').classList.add('active');
    }

    function fecharModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function limparFormulario() {
      document.getElementById('formCampanha').reset();
      document.getElementById('campanhaId').value = '';
      document.getElementById('modalTitulo').textContent = 'Nova Campanha';
    }

    async function listarCampanhas() {
      try {
        const dados = await window.db.marketing_listar();
        campanhasCache = Array.isArray(dados) ? dados : [];
        renderizarTabela(campanhasCache);
        atualizarCards(campanhasCache);
      } catch (e) {
        console.error(e);
        document.getElementById('tabelaCampanhas').innerHTML = '<tr><td colspan="7" class="empty">Erro ao carregar.</td></tr>';
      }
    }

    function renderizarTabela(dados) {
      const tbody = document.getElementById('tabelaCampanhas');
      if (!dados.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">Nenhuma campanha cadastrada.</td></tr>';
        return;
      }
      let classe;
      tbody.innerHTML = dados.map(c => {
        if (c.status === 'Ativa') classe = 'badge-ativa';
        else if (c.status === 'Pausada') classe = 'badge-pausada';
        else classe = 'badge-encerrada';
        return `<tr>
          <td>${c.campanha||''}</td>
          <td>${c.tipo||''}</td>
          <td>${formatarMoeda(c.investimento)}</td>
          <td>${c.resultado||''}</td>
          <td>${c.roi ? Number(c.roi).toFixed(1)+'%' : '-'}</td>
          <td><span class="badge ${classe}">${c.status||''}</span></td>
          <td class="actions">
            <button class="btn btn-primary btn-small" onclick="abrirModal('${c.id}')">Editar</button>
            <button class="btn btn-danger btn-small" onclick="excluirCampanha('${c.id}')">Excluir</button>
          </td>
        </tr>`;
      }).join('');
    }

    function atualizarCards(dados) {
      const ativas = dados.filter(c => c.status === 'Ativa').length;
      const total = dados.reduce((a, c) => a + (parseFloat(c.investimento) || 0), 0);
      const roi = dados.length ? dados.reduce((a, c) => a + (parseFloat(c.roi) || 0), 0) / dados.length : 0;
      document.getElementById('campanhasAtivas').textContent = ativas;
      document.getElementById('investimentoTotal').textContent = formatarMoeda(total);
      document.getElementById('roiMedio').textContent = roi.toFixed(1) + '%';
    }

    function filtrarTabela() {
      const termo = document.getElementById('filtroCampanha').value.toLowerCase();
      renderizarTabela(campanhasCache.filter(c => (c.campanha||'').toLowerCase().includes(termo)));
    }

    async function salvarCampanha(e) {
      e.preventDefault();
      const payload = {
        id: document.getElementById('campanhaId').value || null,
        campanha: document.getElementById('campanha').value.trim(),
        tipo: document.getElementById('tipo').value,
        data_inicio: document.getElementById('data_inicio').value,
        data_fim: document.getElementById('data_fim').value,
        investimento: getValorMoeda(document.getElementById('investimento')),
        valor_estimado: getValorMoeda(document.getElementById('valor_estimado')),
        valor_gasto: getValorMoeda(document.getElementById('valor_gasto')),
        resultado: document.getElementById('resultado').value.trim(),
        roi: parseFloat(document.getElementById('roi').value) || 0,
        status: document.getElementById('status').value
      };
      if (!payload.campanha || !payload.tipo || !payload.status) {
        alert('Preencha nome, tipo e status.');
        return;
      }
      try {
        await window.db.marketing_salvar(payload);
        fecharModal();
        await listarCampanhas();
      } catch (e) {
        alert('Erro ao salvar: ' + e.message);
      }
    }

    async function excluirCampanha(id) {
      if (!confirm('Excluir esta campanha?')) return;
      try {
        await window.db.marketing_excluir(id);
        await listarCampanhas();
      } catch (e) {
        alert('Erro ao excluir: ' + e.message);
      }
    }
  </script>
</body>
</html>
