<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle do Escritório - Marketing</title>
  <style>
    :root {
      --primary: #0a58ca;
      --primary-dark: #084bb1;
      --primary-light: #e8f1fc;
      --success: #198754;
      --warning: #f59e0b;
      --danger: #dc3545;
      --gray: #6c757d;
      --text: #212529;
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #d0d7e0;
    }
    .topo-logo { background-color: #fff; padding: 15px 20px; display: flex; justify-content: center; align-items: center; }
    .logo-escritorio { height: 70px; width: auto; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .navbar {
      background-color: var(--primary);
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .navbar-brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.1rem; }
    .nav-links { list-style: none; display: flex; gap: 1.5rem; }
    .nav-links a { color: rgba(255,255,255,0.9); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    .nav-links a:hover { color: #fff; text-decoration: underline; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .title { font-size: 1.5rem; color: var(--primary); }
    .actions { display: flex; gap: 0.5rem; }
    .card { background: var(--card); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .card-header h2 { font-size: 1.1rem; color: var(--primary); }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat { background: var(--card); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.25rem; text-align: center; }
    .stat-label { font-size: 0.8rem; color: var(--gray); text-transform: uppercase; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-top: 0.25rem; }
    .btn { display: inline-block; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-back { background: var(--gray); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--primary); color: #fff; padding: 0.7rem; text-align: left; font-size: 0.85rem; }
    td { padding: 0.7rem; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; }
    tbody tr:hover { background: var(--primary-light); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border-radius: 10px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .modal-header { background: var(--primary); color: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 1.1rem; }
    .modal-close { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    .modal-body { padding: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .form-group input, .form-group select { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .modal-footer { padding: 1rem 1.5rem; background: #f8fafc; display: flex; justify-content: flex-end; gap: 0.8rem; border-top: 1px solid var(--border); }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .nav-links { display: none; } }
  </style>
</head>
<body>
  <div class="topo-logo">
    <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/apolloayres%40yahoo.com.br/png/image-019eea86-df20-753e-b049-a7c4515d7a68.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260621%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260621T160143Z&X-Amz-Expires=3600&X-Amz-Signature=d86ac73935a9237a01f8898aab4f62b0c323de884239f0049abf5a99c09677ae&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Apollo Ayres" class="logo-escritorio">
  </div>
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">📁 Controle do Escritório</a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="clientes.html">Clientes</a></li>
      <li><a href="financeiro.html">Financeiro</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
    </ul>
  </nav>
  <div class="container">
    <div class="header">
      <h1 class="title">📢 Marketing</h1>
      <div class="actions">
        <button class="btn btn-primary" onclick="abrirModal()">+ Nova Campanha</button>
        <a href="home.html" class="btn btn-back">← Voltar</a>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Total Campanhas</div><div class="stat-value" id="totalCampanhas">0</div></div>
      <div class="stat"><div class="stat-label">Ativas</div><div class="stat-value" id="campanhasAtivas">0</div></div>
      <div class="stat"><div class="stat-label">Valor Total</div><div class="stat-value" id="valorTotal">R$ 0</div></div>
      <div class="stat"><div class="stat-label">Valor Gasto</div><div class="stat-value" id="valorGasto">R$ 0</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Campanhas de Marketing</h2></div>
      <table><thead><tr><th>Nome</th><th>Início</th><th>Fim</th><th>Valor Estimado</th><th>Valor Gasto</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tabelaCampanhas"><tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray)">Nenhuma campanha cadastrada.</td></tr></tbody></table>
    </div>
  </div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header"><h3 id="modalTitle">Nova Campanha</h3><button class="modal-close" onclick="fecharModal()">&times;</button></div>
      <div class="modal-body">
        <form id="formCampanha">
          <input type="hidden" id="campanhaId">
          <div class="form-group"><label>Nome da Campanha</label><input type="text" id="nome" required></div>
          <div class="form-row">
            <div class="form-group"><label>Data Início</label><input type="date" id="dataInicio"></div>
            <div class="form-group"><label>Data Fim</label><input type="date" id="dataFim"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Valor Estimado (R$)</label><input type="number" id="valorEstimado" step="0.01"></div>
            <div class="form-group"><label>Valor Gasto (R$)</label><input type="number" id="valorGastoInput" step="0.01"></div>
          </div>
          <div class="form-group"><label>Status</label><select id="status"><option>Planejada</option><option>Ativa</option><option>Concluída</option><option>Cancelada</option></select></div>
          <div class="form-group"><label>Observações</label><textarea id="observacao" rows="3" style="width:100%;padding:0.6rem;border:1px solid var(--border);border-radius:6px;"></textarea></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-back" onclick="fecharModal()">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    let dados = [];
    const key = 'campanhas_marketing';
    function getData() { try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch(e){return [];} }
    function setData(v) { localStorage.setItem(key,JSON.stringify(v)); }
    function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
    function fmt(v) { return 'R$ '+(v||0).toFixed(2).replace('.',','); }
    function fmtData(d) { if(!d) return '—'; try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}catch(e){return d} }
    function carregar() { dados = getData(); render(); }
    function render() {
      document.getElementById('totalCampanhas').textContent = dados.length;
      const ativas = dados.filter(c=>c.status==='Ativa').length;
      document.getElementById('campanhasAtivas').textContent = ativas;
      document.getElementById('valorTotal').textContent = fmt(dados.reduce((s,c)=>s+(parseFloat(c.valorEstimado)||0),0));
      document.getElementById('valorGasto').textContent = fmt(dados.reduce((s,c)=>s+(parseFloat(c.valorGasto)||0),0));
      const tbody = document.getElementById('tabelaCampanhas');
      tbody.innerHTML = dados.map(c => `<tr><td>${c.nome}</td><td>${fmtData(c.dataInicio)}</td><td>${fmtData(c.dataFim)}</td><td>${fmt(c.valorEstimado)}</td><td>${fmt(c.valorGasto)}</td><td>${c.status}</td><td><button class="btn btn-primary btn-sm" onclick='editar("${c.id}")'>Editar</button><button class="btn btn-danger btn-sm" onclick=excluir("${c.id}")>Excluir</button></td></tr>`).join('');
    }
    function abrirModal() { document.getElementById('formCampanha').reset(); document.getElementById('campanhaId').value=''; document.getElementById('modalTitle').textContent='Nova Campanha'; document.getElementById('modalOverlay').classList.add('active'); }
    function fecharModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    document.getElementById('formCampanha').addEventListener('submit',function(e){e.preventDefault();const id=document.getElementById('campanhaId').value;const obj={id:id||genId(),nome:document.getElementById('nome').value,dataInicio:document.getElementById('dataInicio').value,dataFim:document.getElementById('dataFim').value,valorEstimado:document.getElementById('valorEstimado').value,valorGasto:document.getElementById('valorGastoInput').value,status:document.getElementById('status').value,observacao:document.getElementById('observacao').value};if(id){const i=dados.findIndex(x=>x.id===id);if(i>=0)dados[i]=obj;else dados.push(obj);}else dados.push(obj);setData(dados);fecharModal();render();});
    function editar(id) { const c=dados.find(x=>x.id===id);if(!c)return;document.getElementById('campanhaId').value=c.id;document.getElementById('nome').value=c.nome;document.getElementById('dataInicio').value=c.dataInicio;document.getElementById('dataFim').value=c.dataFim;document.getElementById('valorEstimado').value=c.valorEstimado;document.getElementById('valorGastoInput').value=c.valorGasto;document.getElementById('status').value=c.status;document.getElementById('observacao').value=c.observacao||'';document.getElementById('modalTitle').textContent='Editar Campanha';document.getElementById('modalOverlay').classList.add('active');}
    function excluir(id) { if(confirm('Excluir campanha?')){dados=dados.filter(x=>x.id!==id);setData(dados);render();} }
    document.addEventListener('DOMContentLoaded', carregar);
  </script>
</body>
</html>
