<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro - Controle do Escritório</title>
  <script src="db.js" defer></script>
  <style>
    :root {
      --primary: #0a58ca;
      --primary-dark: #084298;
      --primary-light: #e7f1ff;
      --danger: #dc3545;
      --danger-dark: #b02a37;
      --success: #198754;
      --success-dark: #146c43;
      --warning: #ffc107;
      --warning-dark: #ffca2c;
      --text: #212529;
      --muted: #6c757d;
      --border: #dee2e6;
      --bg: #f8f9fa;
      --white: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 10px;
    }
    .topo-logo { background-color: #fff; padding: 15px 20px; display: flex; justify-content: center; align-items: center; }
    .logo-escritorio { height: 70px; width: auto; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .navbar {
      background: var(--primary);
      color: var(--white);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .navbar-brand { font-size: 1.15rem; font-weight: 700; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-size: 1.5rem; color: var(--primary); }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: 0.2s; }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-success { background: var(--success); color: var(--white); }
    .btn-warning { background: var(--warning); color: #000; }
    .btn-danger { background: var(--danger); color: var(--white); }
    .btn-outline { background: var(--white); color: var(--primary); border: 1px solid var(--primary); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    .tabs { display: flex; gap: 0.25rem; border-bottom: 3px solid var(--primary); margin-bottom: 1.5rem; }
    .tab { padding: 0.65rem 1.4rem; cursor: pointer; background: #e9ecef; border: none; border-radius: 6px 6px 0 0; font-weight: 600; font-size: 0.9rem; color: var(--muted); }
    .tab.active { background: var(--primary); color: var(--white); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .panel { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .panel-header { background: var(--primary); color: var(--white); padding: 0.85rem 1.25rem; display: flex; justify-content: space-between; align-items: center; }
    .panel-title { font-size: 1rem; font-weight: 600; }
    .loading { padding: 1.25rem; text-align: center; color: var(--muted); }
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.75rem 0.85rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); border-bottom: 2px solid var(--border); background: var(--bg); }
    td { padding: 0.7rem 0.85rem; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:hover td { background: var(--primary-light); }
    .actions { display: flex; gap: 0.35rem; }
    .valor-receita { color: var(--success); font-weight: 700; }
    .valor-despesa { color: var(--danger); font-weight: 700; }
    .empty-state { text-align: center; padding: 2.5rem 1.5rem; color: var(--muted); }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--white); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 1.1rem; color: var(--primary); }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); }
    .modal-body { padding: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .form-group input, .form-group select { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(10,88,202,0.15); }
    .form-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1rem; }
    @media (max-width: 640px) {
      .header-actions { flex-direction: column; align-items: flex-start; }
      .tabs { flex-wrap: wrap; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.5rem; }
      .actions { flex-direction: column; gap: 0.35rem; }
    }
  </style>
</head>
<body>
  <div class="topo-logo">
    <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/apolloayres%40yahoo.com.br/png/image-019eea86-df20-753e-b049-a7c4515d7a68.png?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIA3FLD6RMYLYFE2L2Q%2F20260621%2Fsa-east-1%2Fs3%2Faws4_request&X-Amz-Date=20260621T160143Z&X-Amz-Expires=3600&X-Amz-Signature=d86ac73935a9237a01f8898aab4f62b0c323de884239f0049abf5a99c09677ae&X-Amz-SignedHeaders=host&x-amz-checksum-mode=ENABLED&x-id=GetObject" alt="Apollo Ayres" class="logo-escritorio">
  </div>
  <nav class="navbar">
    <div class="navbar-brand">Controle do Escritório</div>
  </nav>
  <div class="container">
    <div class="header-actions">
      <h1 class="page-title">💳 Financeiro</h1>
      <a href="home.html" class="btn btn-outline">← Voltar</a>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="receitas">📥 Receitas</button>
      <button class="tab" data-tab="despesas">📤 Despesas</button>
    </div>
    <div id="receitas" class="tab-content active">
      <div class="panel">
        <div class="panel-header"><h2 class="panel-title">Receitas</h2><button class="btn btn-success" onclick="abrirModalReceita()">+ Nova Receita</button></div>
        <div id="loading-receitas" class="loading">Carregando receitas...</div>
        <div id="tabela-receitas-container"></div>
      </div>
    </div>
    <div id="despesas" class="tab-content">
      <div class="panel">
        <div class="panel-header"><h2 class="panel-title">Despesas</h2><button class="btn btn-success" onclick="abrirModalDespesa()">+ Nova Despesa</button></div>
        <div id="loading-despesas" class="loading">Carregando despesas...</div>
        <div id="tabela-despesas-container"></div>
      </div>
    </div>
  </div>
  <!-- Modais -->
  <div class="modal-overlay" id="modal-receita">
    <div class="modal">
      <div class="modal-header"><h2 id="modal-receita-titulo">Nova Receita</h2><button class="modal-close" onclick="fecharModalReceita()">&times;</button></div>
      <div class="modal-body">
        <form id="form-receita" onsubmit="salvarReceita(event)">
          <input type="hidden" id="receita-id" />
          <div class="form-group"><label for="receita-descricao">Descrição</label><input type="text" id="receita-descricao" required /></div>
          <div class="form-group"><label for="receita-valor">Valor (R$)</label><input type="number" id="receita-valor" step="0.01" min="0.01" required /></div>
          <div class="form-group"><label for="receita-data">Data</label><input type="date" id="receita-data" required /></div>
          <div class="form-group"><label for="receita-categoria">Categoria</label><select id="receita-categoria" class="form-control" required><option value="">Selecione...</option><option value="Honorários">Honorários</option><option value="Sucumbência">Sucumbência</option><option value="Custas">Custas</option><option value="Serviços">Serviços</option><option value="Outros">Outros</option></select></div>
          <div class="form-group"><label for="receita-forma">Forma de pagamento</label><select id="receita-forma" class="form-control" required><option value="">Selecione...</option><option value="Dinheiro">Dinheiro</option><option value="Pix">Pix</option><option value="Cartão de crédito">Cartão de crédito</option><option value="Cartão de débito">Cartão de débito</option><option value="Boleto">Boleto</option><option value="Transferência">Transferência</option><option value="Outro">Outro</option></select></div>
          <div class="form-actions"><button type="button" class="btn btn-outline" onclick="fecharModalReceita()">Cancelar</button><button type="submit" class="btn btn-primary">Salvar</button></div>
        </form>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="modal-despesa">
    <div class="modal">
      <div class="modal-header"><h2 id="modal-despesa-titulo">Nova Despesa</h2><button class="modal-close" onclick="fecharModalDespesa()">&times;</button></div>
      <div class="modal-body">
        <form id="form-despesa" onsubmit="salvarDespesa(event)">
          <input type="hidden" id="despesa-id" />
          <div class="form-group"><label for="despesa-descricao">Descrição</label><input type="text" id="despesa-descricao" required /></div>
          <div class="form-group"><label for="despesa-valor">Valor (R$)</label><input type="number" id="despesa-valor" step="0.01" min="0.01" required /></div>
          <div class="form-group"><label for="despesa-data">Data</label><input type="date" id="despesa-data" required /></div>
          <div class="form-group"><label for="despesa-categoria">Categoria</label><select id="despesa-categoria" class="form-control" required><option value="">Selecione...</option><option value="Aluguel">Aluguel</option><option value="Salários">Salários</option><option value="Impostos">Impostos</option><option value="Fornecedores">Fornecedores</option><option value="Serviços">Serviços</option><option value="Marketing">Marketing</option><option value="Outros">Outros</option></select></div>
          <div class="form-group"><label for="despesa-forma">Forma de pagamento</label><select id="despesa-forma" class="form-control" required><option value="">Selecione...</option><option value="Dinheiro">Dinheiro</option><option value="Pix">Pix</option><option value="Cartão de crédito">Cartão de crédito</option><option value="Cartão de débito">Cartão de débito</option><option value="Boleto">Boleto</option><option value="Transferência">Transferência</option><option value="Outro">Outro</option></select></div>
          <div class="form-group"><label for="despesa-status">Status</label><select id="despesa-status" class="form-control" required><option value="">Selecione...</option><option value="Paga">Paga</option><option value="Pendente">Pendente</option></select></div>
          <div class="form-actions"><button type="button" class="btn btn-outline" onclick="fecharModalDespesa()">Cancelar</button><button type="submit" class="btn btn-primary">Salvar</button></div>
        </form>
      </div>
    </div>
  </div>
  <script src="db.js"></script>
  <script>
    let receitas = [], despesas = [];
    async function carregarDados() {
      try {
        document.getElementById('loading-receitas').style.display = 'block';
        receitas = await window.db.receitas_listar() || [];
        document.getElementById('loading-receitas').style.display = 'none';
        renderizarReceitas();
      } catch(e) { document.getElementById('loading-receitas').textContent = 'Erro ao carregar receitas.'; }
      try {
        despesas = await window.db.despesas_listar() || [];
        renderizarDespesas();
      } catch(e) {}
    }
    function formatarValor(valor) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0); }
    function formatarData(data) { if (!data) return '-'; const d = new Date(data); if (isNaN(d.getTime())) return data; return d.toLocaleDateString('pt-BR'); }
    function renderizarReceitas() {
      const container = document.getElementById('tabela-receitas-container');
      if (!receitas || receitas.length === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📥</div><p>Nenhuma receita cadastrada.</p></div>'; return; }
      let html = '<div class="table-responsive"><table><thead><tr><th>Descrição</th><th>Valor</th><th>Data</th><th>Categoria</th><th>Forma de pagamento</th><th>Ações</th></tr></thead><tbody>';
      receitas.forEach(item => {
        html += '<tr>';
        html += `<td>${item.descricao||''}</td>`;
        html += `<td class="valor-receita">${formatarValor(item.valor)}</td>`;
        html += `<td>${formatarData(item.data)}</td>`;
        html += `<td>${item.categoria||''}</td>`;
        html += `<td>${item.forma_pagamento||''}</td>`;
        html += `<td class="actions"><button class="btn btn-warning" onclick="editarReceita('${item.id}')">Editar</button><button class="btn btn-danger" onclick="excluirReceita('${item.id}')">Excluir</button></td>`;
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }
    function renderizarDespesas() {
      const container = document.getElementById('tabela-despesas-container');
      if (!despesas || despesas.length === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📤</div><p>Nenhuma despesa cadastrada.</p></div>'; return; }
      let html = '<div class="table-responsive"><table><thead><tr><th>Descrição</th><th>Valor</th><th>Data</th><th>Categoria</th><th>Forma de pagamento</th><th>Status</th><th>Ações</th></tr></thead><tbody>';
      despesas.forEach(item => {
        html += '<tr>';
        html += `<td>${item.descricao||''}</td>`;
        html += `<td class="valor-despesa">${formatarValor(item.valor)}</td>`;
        html += `<td>${formatarData(item.data)}</td>`;
        html += `<td>${item.categoria||''}</td>`;
        html += `<td>${item.forma_pagamento||''}</td>`;
        html += `<td>${item.status === 'Paga' ? 'Paga' : 'Pendente'}</td>`;
        html += `<td class="actions"><button class="btn btn-warning" onclick="editarDespesa('${item.id}')">Editar</button><button class="btn btn-danger" onclick="excluirDespesa('${item.id}')">Excluir</button></td>`;
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }
    function abrirModalReceita(id = null) {
      document.getElementById('form-receita').reset();
      document.getElementById('receita-id').value = id || '';
      document.getElementById('modal-receita-titulo').textContent = id ? 'Editar Receita' : 'Nova Receita';
      if (id) { const item = receitas.find(r => r.id === id); if (item) { document.getElementById('receita-descricao').value = item.descricao||''; document.getElementById('receita-valor').value = item.valor||''; document.getElementById('receita-data').value = item.data||''; document.getElementById('receita-categoria').value = item.categoria||''; document.getElementById('receita-forma').value = item.forma_pagamento||''; } }
      document.getElementById('modal-receita').classList.add('active');
    }
    function fecharModalReceita() { document.getElementById('modal-receita').classList.remove('active'); }
    async function salvarReceita(e) {
      e.preventDefault();
      const id = document.getElementById('receita-id').value;
      const obj = { descricao: document.getElementById('receita-descricao').value, valor: parseFloat(document.getElementById('receita-valor').value), data: document.getElementById('receita-data').value, categoria: document.getElementById('receita-categoria').value, forma_pagamento: document.getElementById('receita-forma').value };
      try { await window.db.receitas_salvar(id ? { ...obj, id } : obj); fecharModalReceita(); await carregarDados(); } catch(e) { alert('Erro ao salvar receita.'); }
    }
    async function editarReceita(id) { abrirModalReceita(id); }
    async function excluirReceita(id) { if(!confirm('Excluir?')) return; try { await window.db.receitas_excluir(id); await carregarDados(); } catch(e) { alert('Erro ao excluir receita.'); } }
    function abrirModalDespesa(id = null) {
      document.getElementById('form-despesa').reset();
      document.getElementById('despesa-id').value = id || '';
      document.getElementById('modal-despesa-titulo').textContent = id ? 'Editar Despesa' : 'Nova Despesa';
      if (id) { const item = despesas.find(d => d.id === id); if (item) { document.getElementById('despesa-descricao').value = item.descricao||''; document.getElementById('despesa-valor').value = item.valor||''; document.getElementById('despesa-data').value = item.data||''; document.getElementById('despesa-categoria').value = item.categoria||''; document.getElementById('despesa-forma').value = item.forma_pagamento||''; document.getElementById('despesa-status').value = item.status||''; } }
      document.getElementById('modal-despesa').classList.add('active');
    }
    function fecharModalDespesa() { document.getElementById('modal-despesa').classList.remove('active'); }
    async function salvarDespesa(e) {
      e.preventDefault();
      const id = document.getElementById('despesa-id').value;
      const obj = { descricao: document.getElementById('despesa-descricao').value, valor: parseFloat(document.getElementById('despesa-valor').value), data: document.getElementById('despesa-data').value, categoria: document.getElementById('despesa-categoria').value, forma_pagamento: document.getElementById('despesa-forma').value, status: document.getElementById('despesa-status').value };
      try { await window.db.despesas_salvar(id ? { ...obj, id } : obj); fecharModalDespesa(); await carregarDados(); } catch(e) { alert('Erro ao salvar despesa.'); }
    }
    async function editarDespesa(id) { abrirModalDespesa(id); }
    async function excluirDespesa(id) { if(!confirm('Excluir?')) return; try { await window.db.despesas_excluir(id); await carregarDados(); } catch(e) { alert('Erro ao excluir despesa.'); } }
    document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', function() { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); this.classList.add('active'); document.getElementById(this.dataset.tab).classList.add('active'); }); });
    document.addEventListener('DOMContentLoaded', carregarDados);
  </script>
</body>
</html>
