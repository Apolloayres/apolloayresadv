<script>
    var listaUsuarios = [];

    function validarSenha(senha) {
      if (senha.length < 6) return 'A senha deve ter no mínimo 6 caracteres.';
      if (!/[A-Z]/.test(senha)) return 'A senha deve conter pelo menos uma letra maiúscula.';
      if (!/[!@#$%^&*(),.?":{}|<>_]/.test(senha)) return 'A senha deve conter pelo menos um caractere especial (!@#$% etc).';
      return null;
    }

    function escapeHtml(text) {
      if (text == null) return '';
      return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    async function renderizarUsuarios() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('tabela-usuarios').style.display = 'none';
      try {
        listaUsuarios = await window.carregarUsuarios();
        var total = 0, admins = 0, ativos = 0, inativos = 0;
        listaUsuarios.forEach(function(u) {
          total++;
          if (u.perfil === 'Administrador') admins++;
          if (u.status === 'Ativo') ativos++;
          if (u.status === 'Inativo') inativos++;
        });
        document.getElementById('ind-total').textContent = total;
        document.getElementById('ind-admin').textContent = admins;
        document.getElementById('ind-ativo').textContent = ativos;
        document.getElementById('ind-inativo').textContent = inativos;

        var tbody = document.getElementById('tbody-usuarios');
        tbody.innerHTML = '';
        if (listaUsuarios.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:#6c757d;">Nenhum usuário cadastrado.</td></tr>';
        } else {
          listaUsuarios.forEach(function(u) {
            var tr = document.createElement('tr');
            tr.innerHTML = '<td>' + escapeHtml(u.nome) + '</td>' +
              '<td>' + escapeHtml(u.email) + '</td>' +
              '<td><span class="badge ' + (u.perfil === 'Administrador' ? 'badge-admin' : 'badge-usuario') + '">' + escapeHtml(u.perfil) + '</span></td>' +
              '<td><span class="badge ' + (u.status === 'Ativo' ? 'badge-ativo' : 'badge-inativo') + '">' + escapeHtml(u.status) + '</span></td>' +
              '<td><button class="btn btn-warning" onclick="abrirModal(\'' + escapeHtml(u.id) + '\')">Editar</button> ' +
              '<button class="btn btn-danger" onclick="excluirUsuario(\'' + escapeHtml(u.id) + '\')">Excluir</button></td>';
            tbody.appendChild(tr);
          });
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tabela-usuarios').style.display = 'table';
      } catch (e) {
        document.getElementById('loading').textContent = 'Erro ao carregar: ' + e.message;
      }
    }

    function abrirModal(id) {
      if (id) {
        document.getElementById('modal-titulo').textContent = 'Editar Usuário';
        var u = null;
        for (var i = 0; i < listaUsuarios.length; i++) {
          if (listaUsuarios[i].id === id) { u = listaUsuarios[i]; break; }
        }
        if (!u) return alert('Usuário não encontrado.');
        document.getElementById('usuario-id').value = u.id;
        document.getElementById('usuario-nome').value = u.nome;
        document.getElementById('usuario-email').value = u.email;
        document.getElementById('usuario-senha').value = '';
        document.getElementById('usuario-perfil').value = u.perfil;
        document.getElementById('usuario-status').value = u.status;
      } else {
        document.getElementById('modal-titulo').textContent = 'Novo Usuário';
        document.getElementById('usuario-id').value = '';
        document.getElementById('usuario-nome').value = '';
        document.getElementById('usuario-email').value = '';
        document.getElementById('usuario-senha').value = '';
        document.getElementById('usuario-perfil').value = 'Usuário';
        document.getElementById('usuario-status').value = 'Ativo';
      }
      document.getElementById('modal-usuario').classList.add('ativo');
    }

    function fecharModal() {
      document.getElementById('modal-usuario').classList.remove('ativo');
    }

    async function salvarUsuario() {
      var id = document.getElementById('usuario-id').value;
      var nome = document.getElementById('usuario-nome').value.trim();
      var email = document.getElementById('usuario-email').value.trim();
      var senha = document.getElementById('usuario-senha').value;
      var perfil = document.getElementById('usuario-perfil').value;
      var status = document.getElementById('usuario-status').value;

      if (!nome || !email) { alert('Preencha nome e email.'); return; }
      if (!id && !senha) { alert('Senha é obrigatória para novo usuário.'); return; }
      if (senha) {
        var erro = validarSenha(senha);
        if (erro) { alert(erro); return; }
      }

      var obj = { nome: nome, email: email, senha: senha, perfil: perfil, status: status };
      if (id) obj.id = id;

      try {
        await window.salvarUsuario(obj);
        fecharModal();
        await renderizarUsuarios();
      } catch (e) {
        alert('Erro: ' + (e.message || e));
      }
    }

    async function excluirUsuario(id) {
      if (!confirm('Tem certeza?')) return;
      try {
        await window.excluirUsuario(id);
        await renderizarUsuarios();
      } catch (e) {
        alert('Erro: ' + (e.message || e));
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      window.verificarAutenticacao();
      window.verificarAdmin();
      await renderizarUsuarios();
    });
</script>
