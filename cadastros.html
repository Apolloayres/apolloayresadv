<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros - Controle do Escritório</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f6ff;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: #0a58ca;
            color: #ffffff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(10, 88, 202, 0.3);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .navbar-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        .navbar-links a:hover {
            opacity: 0.85;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 1.75rem;
            color: #0a58ca;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        /* Botões */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.65rem 1.1rem;
            border-radius: 0.5rem;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #0a58ca;
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #0846a0;
        }

        .btn-link {
            background-color: transparent;
            color: #0a58ca;
            padding: 0.5rem 0.8rem;
        }

        .btn-link:hover {
            background-color: #e0ecff;
        }

        .btn-success {
            background-color: #198754;
            color: #ffffff;
        }

        .btn-success:hover {
            background-color: #146c43;
        }

        .btn-danger {
            background-color: #dc3545;
            color: #ffffff;
        }

        .btn-danger:hover {
            background-color: #b02a37;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background-color: #565e64;
        }

        .btn-sm {
            padding: 0.4rem 0.7rem;
            font-size: 0.85rem;
        }

        /* Card */
        .card {
            background-color: #ffffff;
            border-radius: 0.75rem;
            box-shadow: 0 2px 12px rgba(10, 88, 202, 0.1);
            overflow: hidden;
        }

        /* Tabela */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #e8f0fe;
        }

        th {
            color: #0a58ca;
            font-weight: 700;
            text-align: left;
            padding: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #e0ecff;
            font-size: 0.92rem;
            color: #333333;
        }

        tbody tr:hover {
            background-color: #f5f9ff;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
            color: #0a58ca;
            opacity: 0.5;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: #ffffff;
            border-radius: 0.75rem;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            background-color: #0a58ca;
            color: #ffffff;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.45rem;
            font-weight: 600;
            color: #0a58ca;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.7rem 0.85rem;
            border: 1px solid #c2d6ff;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background-color: #ffffff;
        }

        .form-control:focus {
            outline: none;
            border-color: #0a58ca;
            box-shadow: 0 0 0 3px rgba(10, 88, 202, 0.15);
        }

        .modal-footer {
            padding: 1rem 1.5rem 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* Alerta */
        .alert {
            padding: 0.9rem 1.25rem;
            border-radius: 0.5rem;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.95rem;
        }

        .alert.active {
            display: block;
        }

        .alert-success {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 0.75rem;
                padding: 1rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .actions {
                width: 100%;
                justify-content: space-between;
            }

            th, td {
                padding: 0.75rem 0.6rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">⚖️ Controle do Escritório</div>
        <ul class="navbar-links">
            <li><a href="home.html">Início</a></li>
            <li><a href="cadastros.html">Cadastros</a></li>
            <li><a href="agenda.html">Agenda</a></li>
            <li><a href="financeiro.html">Financeiro</a></li>
            <li><a href="tarefas.html">Tarefas</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- Alertas -->
        <div id="alert" class="alert" role="alert"></div>

        <div class="page-header">
            <h1 class="page-title">📋 Cadastros</h1>
            <div class="actions">
                <a href="home.html" class="btn btn-link">← Voltar</a>
                <button type="button" class="btn btn-primary" onclick="abrirModal()">+ Novo Cadastro</button>
            </div>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table id="tabelaColaboradores">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Cargo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="empty-state-icon">📋</div>
                                Carregando colaboradores...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitulo">Novo Cadastro</h2>
                <button type="button" class="modal-close" onclick="fecharModal()" aria-label="Fechar">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formColaborador">
                    <input type="hidden" id="id">

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" class="form-control" placeholder="Nome completo" required>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="email@exemplo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group">
                        <label for="cargo">Cargo</label>
                        <select id="cargo" class="form-control" required>
                            <option value="">Selecione o cargo</option>
                            <option value="advogado">Advogado</option>
                            <option value="estagiario">Estagiário</option>
                            <option value="administrativo">Administrativo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="data_entrada">Data de entrada</label>
                        <input type="date" id="data_entrada" class="form-control" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="salvarColaborador()">Salvar</button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        let colaboradores = [];

        document.addEventListener('DOMContentLoaded', () => {
            carregarColaboradores();
        });

        async function carregarColaboradores() {
            try {
                colaboradores = await window.db.colaboradores_listar();
                renderizarTabela(colaboradores);
            } catch (erro) {
                console.error('Erro ao carregar colaboradores:', erro);
                mostrarAlerta('Erro ao carregar colaboradores.', 'error');
                renderizarTabela([]);
            }
        }

        function renderizarTabela(lista) {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';

            if (!lista || lista.length === 0) {
                corpo.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            Nenhum colaborador cadastrado.
                        </td>
                    </tr>
                `;
                return;
            }

            lista.forEach(colaborador => {
                const cargoFormatado = formatarCargo(colaborador.cargo);
                const dataFormatada = formatarData(colaborador.data_entrada);

                const linha = document.createElement('tr');
                linha.innerHTML = `
                    <td>${escapeHtml(colaborador.nome || '')}</td>
                    <td>${escapeHtml(colaborador.cpf || '')}</td>
                    <td>${escapeHtml(colaborador.email || '')}</td>
                    <td>${escapeHtml(colaborador.telefone || '')}</td>
                    <td>${escapeHtml(cargoFormatado)}</td>
                    <td>
                        <div class="actions-cell">
                            <button type="button" class="btn btn-primary btn-sm" onclick="editarColaborador('${colaborador.id}')">Editar</button>
                            <button type="button" class="btn btn-danger btn-sm" onclick="excluirColaborador('${colaborador.id}')">Excluir</button>
                        </div>
                    </td>
                `;
                corpo.appendChild(linha);
            });
        }

        function formatarCargo(cargo) {
            const cargos = {
                advogado: 'Advogado',
                estagiario: 'Estagiário',
                administrativo: 'Administrativo'
            };
            return cargos[cargo] || (cargo || '');
        }

        function formatarData(data) {
            if (!data) return '';
            try {
                const d = new Date(data);
                if (isNaN(d.getTime())) return data;
                return d.toLocaleDateString('pt-BR');
            } catch (e) {
                return data;
            }
        }

        function escapeHtml(texto) {
            if (!texto) return '';
            return String(texto)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function abrirModal() {
            document.getElementById('formColaborador').reset();
            document.getElementById('id').value = '';
            document.getElementById('modalTitulo').textContent = 'Novo Cadastro';
            document.getElementById('modal').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function editarColaborador(id) {
            try {
                const colaborador = await window.db.colaboradores_buscar(id);
                if (!colaborador) {
                    mostrarAlerta('Colaborador não encontrado.', 'error');
                    return;
                }

                document.getElementById('id').value = colaborador.id || '';
                document.getElementById('nome').value = colaborador.nome || '';
                document.getElementById('cpf').value = colaborador.cpf || '';
                document.getElementById('email').value = colaborador.email || '';
                document.getElementById('telefone').value = colaborador.telefone || '';
                document.getElementById('cargo').value = colaborador.cargo || '';
                document.getElementById('data_entrada').value = formatarDataInput(colaborador.data_entrada);

                document.getElementById('modalTitulo').textContent = 'Editar Cadastro';
                document.getElementById('modal').classList.add('active');
            } catch (erro) {
                console.error('Erro ao buscar colaborador:', erro);
                mostrarAlerta('Erro ao carregar dados do colaborador.', 'error');
            }
        }

        function formatarDataInput(data) {
            if (!data) return '';
            try {
                const d = new Date(data);
                if (isNaN(d.getTime())) return data;
                const ano = d.getFullYear();
                const mes = String(d.getMonth() + 1).padStart(2, '0');
                const dia = String(d.getDate()).padStart(2, '0');
                return `${ano}-${mes}-${dia}`;
            } catch (e) {
                return data;
            }
        }

        async function salvarColaborador() {
            const form = document.getElementById('formColaborador');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const id = document.getElementById('id').value.trim();
            const colaborador = {
                nome: document.getElementById('nome').value.trim(),
                cpf: document.getElementById('cpf').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                cargo: document.getElementById('cargo').value,
                data_entrada: document.getElementById('data_entrada').value
            };

            if (id) {
                colaborador.id = id;
            }

            try {
                await window.db.colaboradores_salvar(colaborador);
                fecharModal();
                mostrarAlerta(id ? 'Colaborador atualizado com sucesso!' : 'Colaborador cadastrado com sucesso!', 'success');
                await carregarColaboradores();
            } catch (erro) {
                console.error('Erro ao salvar colaborador:', erro);
                mostrarAlerta('Erro ao salvar colaborador.', 'error');
            }
        }

        async function excluirColaborador(id) {
            if (!confirm('Tem certeza que deseja excluir este colaborador?')) {
                return;
            }

            try {
                await window.db.colaboradores_excluir(id);
                mostrarAlerta('Colaborador excluído com sucesso!', 'success');
                await carregarColaboradores();
            } catch (erro) {
                console.error('Erro ao excluir colaborador:', erro);
                mostrarAlerta('Erro ao excluir colaborador.', 'error');
            }
        }

        function mostrarAlerta(mensagem, tipo) {
            const alert = document.getElementById('alert');
            alert.textContent = mensagem;
            alert.className = 'alert active alert-' + tipo;
            setTimeout(() => {
                alert.classList.remove('active');
            }, 4000);
        }

        // Fechar modal ao clicar fora
        document.getElementById('modal').addEventListener('click', function (event) {
            if (event.target === this) {
                fecharModal();
            }
        });
    </script>
</body>
</html>
